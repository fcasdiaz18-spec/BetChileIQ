<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BetIQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#06080E;--bg1:#0A0D16;--bg2:#0F131E;--bg3:#151A28;--bg4:#1C2233;--bg5:#232A3E;
  --b1:rgba(255,255,255,.055);--b2:rgba(255,255,255,.09);--b3:rgba(255,255,255,.14);
  --t1:#EEF1FF;--t2:#8E96B8;--t3:#525A78;
  --green:#00E676;--gbg:rgba(0,230,118,.09);--gbr:rgba(0,230,118,.22);
  --yellow:#FFD600;--ybg:rgba(255,214,0,.09);--ybr:rgba(255,214,0,.22);
  --red:#FF4545;--rbg:rgba(255,69,69,.09);--rbr:rgba(255,69,69,.22);
  --accent:#7B6FFF;--a2:#A49DFF;--abg:rgba(123,111,255,.11);--abr:rgba(123,111,255,.28);
  --teal:#00C8E0;--tbg:rgba(0,200,224,.09);
  --r:12px;--rs:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--t1);font-size:13px;overflow-x:hidden;min-height:100vh}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(6,8,14,.93);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);height:52px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;letter-spacing:-1px;color:var(--t1)}
.logo span{color:var(--a2)}
.hdr-right{display:flex;align-items:center;gap:8px}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:600;border:1px solid var(--b2);background:var(--bg3)}
.status-dot{width:6px;height:6px;border-radius:50%}
.status-dot.live{background:var(--green);animation:blink 2s infinite}
.status-dot.demo{background:var(--yellow)}
.status-dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all .15s}
.hdr-btn:hover{color:var(--t1);border-color:var(--b3)}
.hdr-btn.accent{background:var(--abg);border-color:var(--abr);color:var(--a2)}

/* NAV */
.nav{background:var(--bg1);border-bottom:1px solid var(--b1);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 8px}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:12px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;
  color:var(--t3);white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s}
.ntab:hover{color:var(--t2)}
.ntab.on{color:var(--a2);border-bottom-color:var(--a2)}

/* LAYOUT */
.view{padding:14px 16px;max-width:880px;margin:0 auto;min-height:calc(100vh - 100px)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r)}
.cp{padding:14px 16px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.kpi-row{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px}
.kpi-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.kpi-v{font-size:26px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.kpi-s{font-size:10px;color:var(--t3);margin-top:4px}
.kpi-s.up{color:var(--green)} .kpi-s.dn{color:var(--red)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.badge.g{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.badge.y{background:var(--ybg);color:var(--yellow);border:1px solid var(--ybr)}
.badge.r{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
.badge.a{background:var(--abg);color:var(--a2);border:1px solid var(--abr)}
.badge.t{background:var(--tbg);color:var(--teal);border:1px solid rgba(0,200,224,.2)}

/* SIGNAL */
.sig{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase}
.sig.AP{background:var(--gbg);color:var(--green)}
.sig.ES{background:var(--ybg);color:var(--yellow)}
.sig.EV{background:var(--rbg);color:var(--red)}

/* PROGRESS */
.pb{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:4px}
.pb-f{height:100%;border-radius:2px;transition:width .5s ease}

/* FORM DOTS */
.form{display:flex;gap:3px}
.fd{width:16px;height:16px;border-radius:4px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fd.W{background:var(--gbg);color:var(--green)} .fd.D{background:var(--ybg);color:var(--yellow)} .fd.L{background:var(--rbg);color:var(--red)}

/* MATCH CARDS */
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:border-color .18s}
.mc:hover{border-color:var(--b2)} .mc.open{border-color:var(--abr)}
.mc-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.mc-league{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.mc-time{font-size:11px;color:var(--teal);font-weight:600}
.mc-body{display:flex;align-items:center;padding:0 14px 10px;gap:6px}
.mc-team{flex:1} .mc-team.r{text-align:right}
.mc-tn{font-size:13px;font-weight:700} .mc-ts{font-size:10px;color:var(--t3);margin-top:2px}
.mc-vs{text-align:center;flex-shrink:0;padding:0 8px}
.mc-vs-txt{font-size:10px;color:var(--t3);font-weight:700}
.mc-vs-prob{font-size:10px;color:var(--t2);margin-top:1px}
.mc-pills{display:flex;gap:5px;padding:0 14px 12px;flex-wrap:wrap}
.pill{padding:4px 9px;border-radius:16px;font-size:10px;font-weight:600;border:1px solid transparent}
.pill.g{background:var(--gbg);color:var(--green);border-color:var(--gbr)}
.pill.y{background:var(--ybg);color:var(--yellow);border-color:var(--ybr)}
.pill.r{background:var(--rbg);color:var(--red);border-color:var(--rbr)}
.mc-detail{display:none;border-top:1px solid var(--b1);padding:14px;animation:fadeUp .2s ease}
.mc.open .mc-detail{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}

/* SUGGESTION CARD */
.sug{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:10px;transition:border-color .18s}
.sug:hover{border-color:var(--b2)} .sug.top{border-color:var(--abr)}
.sug-hdr{display:flex;gap:10px;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sug-left{flex:1;min-width:0}
.sug-match{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sug-sub{font-size:10px;color:var(--t3);margin-top:2px}
.sug-pct{font-size:30px;font-weight:800;font-family:'Syne',sans-serif;line-height:1;flex-shrink:0}
.sug-box{background:var(--bg3);border-radius:var(--rs);padding:10px 12px;margin-bottom:10px}
.sug-pred{font-size:14px;font-weight:700;margin-bottom:3px}
.sug-why{font-size:11px;color:var(--t2);line-height:1.65}
.sug-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px}

/* ODDS */
.oe{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.oe-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.oe-match{font-size:13px;font-weight:700}
.oe-meta{font-size:10px;color:var(--t3);margin-top:2px}
.oe-time{font-size:11px;color:var(--teal);font-weight:600;flex-shrink:0;text-align:right}
.oe-ocs{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.oe-oc{background:var(--bg3);border-radius:var(--rs);padding:10px 12px}
.oe-oc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.oe-oc-name{font-size:12px;font-weight:600}
.oe-best-bk{font-size:10px;color:var(--t2);margin-top:2px;display:flex;align-items:center;gap:4px}
.bk-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.oe-price{font-size:22px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.oe-impl{font-size:9px;color:var(--t3)}
.bk-scroll{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-top:8px}
.bk-scroll::-webkit-scrollbar{display:none}
.bk-chip{background:var(--bg4);border-radius:6px;padding:5px 8px;text-align:center;flex-shrink:0;min-width:68px}
.bk-chip.best{background:var(--gbg);border:1px solid var(--gbr)}
.bk-n{font-size:9px;color:var(--t3);margin-bottom:2px}
.bk-p{font-size:12px;font-weight:700} .bk-p.best{color:var(--green)}

/* SCORES / RESULTS */
.score-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.score-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.score-league{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.score-status{font-size:10px;font-weight:700}
.score-teams{display:flex;align-items:center;justify-content:space-between;gap:6px}
.score-team{flex:1;font-size:13px;font-weight:600}
.score-team.r{text-align:right}
.score-result{text-align:center;font-size:20px;font-weight:800;font-family:'Syne',sans-serif;padding:0 10px}

/* TRACKER */
.tr-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.tr-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b1)}
.tr-row:last-child{border:none}
.tr-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-m{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-s{font-size:10px;color:var(--t3);margin-top:2px}
.tr-btns{display:flex;gap:4px;flex-shrink:0}
.tr-btn{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;background:transparent}

/* SECTION HEADER */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-title{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.sh-action{font-size:11px;color:var(--a2);cursor:pointer;font-weight:500}

/* FILTER CHIPS */
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;
  border:1px solid var(--b2);background:transparent;color:var(--t2);white-space:nowrap;transition:all .15s}
.chip:hover{background:var(--bg3);color:var(--t1)}
.chip.on{background:var(--abg);color:var(--a2);border-color:var(--abr)}

/* QUICK BUTTONS (Dashboard) */
.qbtn{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:var(--r);
  border:1px solid var(--b2);background:var(--bg3);cursor:pointer;transition:all .15s;text-align:left}
.qbtn:hover{border-color:var(--b3);background:var(--bg4)}
.qbtn-icon{font-size:20px;flex-shrink:0}
.qbtn-label{font-size:12px;font-weight:700}
.qbtn-sub{font-size:10px;color:var(--t3);margin-top:2px}

/* NOTICE / ERROR */
.notice{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--rs);
  font-size:11px;margin-bottom:12px}
.notice.info{background:var(--tbg);border:1px solid rgba(0,200,224,.15);color:var(--teal)}
.notice.warn{background:var(--ybg);border:1px solid var(--ybr);color:var(--yellow)}
.notice.err{background:var(--rbg);border:1px solid var(--rbr);color:var(--red)}
.notice.ok{background:var(--gbg);border:1px solid var(--gbr);color:var(--green)}

/* LOADING STATES */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:28px;height:28px;border:2px solid var(--bg4);border-top-color:var(--a2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--t3)}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
  background-size:200%;animation:shimmer 1.4s infinite;border-radius:6px;height:14px}
@keyframes shimmer{to{background-position:-200% 0}}

/* KEY SETUP SCREEN */
.key-screen{padding:32px 20px;text-align:center}
.key-icon{font-size:44px;margin-bottom:14px}
.key-title{font-size:16px;font-weight:700;margin-bottom:8px}
.key-sub{font-size:12px;color:var(--t2);line-height:1.7;max-width:360px;margin:0 auto 20px}
.key-steps{background:var(--bg3);border-radius:var(--rs);padding:14px 16px;max-width:380px;
  margin:0 auto 20px;text-align:left;font-size:12px;color:var(--t2);line-height:2.1}
.key-steps a{color:var(--a2);text-decoration:none}
.key-input{width:100%;max-width:400px;background:var(--bg3);border:1px solid var(--b2);
  border-radius:var(--rs);padding:11px 14px;color:var(--t1);font-size:13px;
  font-family:'Inter',sans-serif;outline:none;display:block;margin:0 auto 12px;transition:border-color .2s}
.key-input:focus{border-color:var(--accent)}
.key-note{font-size:10px;color:var(--t3);margin-top:10px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:24px;
  width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:8px}
.modal p{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.65}
.modal label{font-size:11px;color:var(--t3);display:block;margin-bottom:5px}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);
  padding:10px 13px;color:var(--t1);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s;margin-bottom:14px}
.modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;padding:10px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:none}
.mbtn.pri{background:var(--accent);color:#fff} .mbtn.pri:hover{background:var(--a2)}
.mbtn.sec{background:var(--bg4);color:var(--t2)} .mbtn.sec:hover{color:var(--t1)}

/* REFRESH BTN */
.refresh-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--abr);
  background:var(--abg);color:var(--a2);transition:all .15s;white-space:nowrap}
.refresh-btn:hover{background:rgba(123,111,255,.2)}
.refresh-btn.spinning .ri{animation:spin .8s linear infinite}
.ri{display:inline-block}

/* USAGE BAR */
.usage-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);
  border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:12px}
.usage-lbl{font-size:10px;color:var(--t3);white-space:nowrap}
.usage-track{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.usage-fill{height:100%;border-radius:2px;transition:width .5s}
.usage-val{font-size:11px;font-weight:700;white-space:nowrap}

/* SELECT */
.sel{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:8px 12px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;
  outline:none;cursor:pointer}

/* DONUT SVG */
.donut-wrap{display:flex;justify-content:space-around;padding:6px 0}
.donut-item{text-align:center}
.donut-lbl{font-size:10px;color:var(--t3);margin-top:3px}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:13px;color:var(--t2);margin-bottom:4px}
.empty-sub{font-size:11px;color:var(--t3)}

/* LIVE BADGE */
.live-tag{background:var(--rbg);border:1px solid var(--rbr);color:var(--red);
  font-size:9px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:10px;animation:blink 1.5s infinite}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.g2{grid-template-columns:1fr}}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;
  padding:5px 8px;border-bottom:1px solid var(--b1);text-align:left}
.tbl th.c{text-align:center} .tbl td{padding:7px 8px;font-size:11px;border-bottom:1px solid var(--b1);vertical-align:middle}
.tbl td.c{text-align:center} .tbl tr:last-child td{border:none}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="logo">Bet<span>IQ</span></div>
  <div class="hdr-right">
    <div class="status-pill">
      <div class="status-dot demo" id="sdot"></div>
      <span id="stxt">Demo</span>
    </div>
    <button class="hdr-btn accent" onclick="openModal()">⚙ Keys</button>
  </div>
</header>

<!-- NAV -->
<nav class="nav">
  <button class="ntab on"  id="nt-dash"    onclick="nav('dash')">Dashboard</button>
  <button class="ntab"     id="nt-sugs"    onclick="nav('sugs')">💡 Picks</button>
  <button class="ntab"     id="nt-matches" onclick="nav('matches')">⚽ Partidos</button>
  <button class="ntab"     id="nt-odds"    onclick="nav('odds')">💰 Cuotas</button>
  <button class="ntab"     id="nt-scores"  onclick="nav('scores')">📊 Resultados</button>
  <button class="ntab"     id="nt-tracker" onclick="nav('tracker')">🎯 Tracker</button>
</nav>

<div class="view" id="view"></div>

<!-- MODAL -->
<div class="overlay" id="modal">
<div class="modal">
  <h3>⚙ Configuración</h3>
  <p>Ingresa tu API Key de <strong>The Odds API</strong>. Con key válida, TODA la app usa datos reales. <a href="https://the-odds-api.com" target="_blank" style="color:var(--a2)">Obtener key gratuita →</a></p>
  <label>The Odds API Key</label>
  <input id="m-odds" type="password" placeholder="32 caracteres aprox...">
  <div id="m-test-result" style="font-size:11px;margin-bottom:12px;min-height:16px"></div>
  <div class="modal-btns">
    <button class="mbtn sec" onclick="closeModal()">Cancelar</button>
    <button class="mbtn pri" onclick="testAndSave()">✓ Verificar y Guardar</button>
  </div>
</div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
var APP = {
  tab: 'dash',
  key: localStorage.getItem('biq_key') || '',
  keyValid: false,
  usage: { remaining: null, used: null },

  /* data stores — shared across all tabs */
  sports: [],          // available sports from API
  events: {},          // events by sport key
  odds: {},            // odds by sport key + market
  scores: {},          // scores by sport key
  sugs: [],            // computed suggestions
  
  /* UI state */
  sport: 'soccer_fifa_world_cup',
  market: 'h2h',
  filterCat: 'all',
  minProb: 0,
  expandedMatch: null,
  loading: {},         // loading[section] = bool
  errors: {},          // errors[section] = string
  bets: JSON.parse(localStorage.getItem('biq_bets') || '[]'),
  lastRefresh: null
};

/* ═══════════════════════════════════════════════
   CONFIG

/* ═══════════════════════════════════════════════
   ANALYSIS ENGINE (Poisson + Implied Prob)
═══════════════════════════════════════════════ */
function fac(n){ var r=1; for(var i=2;i<=n;i++) r*=i; return r; }
function poi(l,k){ return Math.pow(l,k)*Math.exp(-l)/fac(k); }

function impliedProbs(event) {
  /* extract implied probs from best odds across bookmakers */
  var map = {};
  (event.bookmakers||[]).forEach(function(bkr){
    var mkt = null;
    for(var i=0;i<(bkr.markets||[]).length;i++){ if(bkr.markets[i].key==='h2h'){mkt=bkr.markets[i];break;} }
    if(!mkt) return;
    mkt.outcomes.forEach(function(o){
      if(!map[o.name]||o.price>map[o.name]) map[o.name]=o.price;
    });
  });
  var keys = Object.keys(map);
  if(!keys.length) return null;
  var rawSum = keys.reduce(function(s,k){ return s+(1/map[k]); }, 0);
  var probs = {};
  keys.forEach(function(k){ probs[k] = (1/map[k]) / rawSum; });
  return probs;
}

function calcPoisson(pH, pA) {
  /* Given prob of home win pH and away win pA, estimate lambdas */
  var pD = 1 - pH - pA;
  /* Rough lambda from win probability */
  var lH = Math.max(0.5, -Math.log(1-pH)*1.8);
  var lA = Math.max(0.5, -Math.log(1-pA)*1.8);
  var max=8, o15=0, o25=0, o35=0, btts=0, topScores=[];
  for(var i=0;i<=max;i++){
    for(var j=0;j<=max;j++){
      var p=poi(lH,i)*poi(lA,j);
      if(i+j>1.5) o15+=p;
      if(i+j>2.5) o25+=p;
      if(i+j>3.5) o35+=p;
      if(i>=1&&j>=1) btts+=p;
      if(i<=4&&j<=4) topScores.push({h:i,a:j,p:p});
    }
  }
  topScores.sort(function(a,b){return b.p-a.p;});
  return {pH:pH, pA:pA, pD:pD, o15:o15, o25:o25, o35:o35, btts:btts, top:topScores.slice(0,6), lH:lH, lA:lA};
}

function analyzeEvent(ev) {
  var ip = impliedProbs(ev);
  if (!ip) return null;
  var home = ev.home_team, away = ev.away_team;
  /* Find home/away probs */
  var pH = ip[home] || 0.33;
  var pA = ip[away] || 0.33;
  var pD = ip['Draw'] || (1-pH-pA);
  /* Normalize */
  var tot = pH+pA+pD;
  pH/=tot; pA/=tot; pD/=tot;
  var pa = calcPoisson(pH, pA);
  pa.pD = pD;

  var mkts = [
    {cat:'1X2',    name:'Victoria '+home,      prob:pa.pH,   key:'home'},
    {cat:'1X2',    name:'Empate',               prob:pa.pD,   key:'draw'},
    {cat:'1X2',    name:'Victoria '+away,       prob:pa.pA,   key:'away'},
    {cat:'BTTS',   name:'Ambos anotan — Si',    prob:pa.btts, key:'btts'},
    {cat:'Goles',  name:'Over 1.5 goles',       prob:pa.o15,  key:'o15'},
    {cat:'Goles',  name:'Over 2.5 goles',       prob:pa.o25,  key:'o25'},
    {cat:'Goles',  name:'Over 3.5 goles',       prob:pa.o35,  key:'o35'},
    {cat:'DC',     name:'DC ('+home+' o Emp)', prob:pa.pH+pa.pD, key:'dc_h'},
    {cat:'DC',     name:'DC ('+away+' o Emp)', prob:pa.pA+pa.pD, key:'dc_a'}
  ];
  mkts.forEach(function(m){
    m.sig = m.prob>=0.65?'AP':m.prob>=0.48?'ES':'EV';
    m.rk  = m.prob>=0.65?'g':m.prob>=0.48?'y':'r';
  });
  mkts.sort(function(a,b){return b.prob-a.prob;});
  return {pa:pa, mkts:mkts, ip:ip};
}

function buildSuggestions(events) {
  var pool = [];
  events.forEach(function(ev) {
    var a = analyzeEvent(ev);
    if(!a) return;
    a.mkts.forEach(function(mk) {
      if(mk.prob >= 0.60) {
        pool.push({
          evId: ev.id,
          sport_key: ev.sport_key,
          match: ev.home_team + ' vs ' + ev.away_team,
          home: ev.home_team, away: ev.away_team,
          league: (SPORTS_CFG[ev.sport_key]||{}).n || ev.sport_key,
          group: (SPORTS_CFG[ev.sport_key]||{}).g || 'Otros',
          date: fmtDate(ev.commence_time),
          cat: mk.cat, pred: mk.name,
          prob: mk.prob, rk: mk.rk, sig: mk.sig,
          reason: makeReason(ev, mk, a),
          analysis: a,
          ev: ev
        });
      }
    });
  });
  pool.sort(function(a,b){return b.prob-a.prob;});
  /* max 2 per match */
  var matchCount={}, out=[];
  pool.forEach(function(p){
    if(!matchCount[p.evId]) matchCount[p.evId]=0;
    if(matchCount[p.evId]<2){ matchCount[p.evId]++; out.push(p); }
  });
  return out;
}

/* ── COMBINADA ENGINE ─────────────────────────────────────── */
function buildCombinadas(events) {
  /* Group best pick per sport_key/country */
  var byGroup = {};
  events.forEach(function(ev) {
    var a = analyzeEvent(ev);
    if(!a) return;
    var grp = (SPORTS_CFG[ev.sport_key]||{}).g || 'Otros';
    var best = null;
    a.mkts.forEach(function(mk){
      if(mk.prob>=0.58 && (!best||mk.prob>best.prob)) best=mk;
    });
    if(!best) return;
    /* Find best bookie odds for this outcome */
    var bestOdds = null;
    (ev.bookmakers||[]).forEach(function(bkr){
      var mkt=null;
      for(var i=0;i<(bkr.markets||[]).length;i++){if(bkr.markets[i].key==='h2h'){mkt=bkr.markets[i];break;}}
      if(!mkt) return;
      mkt.outcomes.forEach(function(o){
        /* map outcome name to our key */
        var isHome = o.name===ev.home_team && best.key==='home';
        var isAway = o.name===ev.away_team && best.key==='away';
        var isDraw = o.name==='Draw' && best.key==='draw';
        if(isHome||isAway||isDraw){
          if(!bestOdds||o.price>bestOdds.price) bestOdds={price:o.price, bookie:bkr.key, title:bkr.title};
        }
      });
    });
    /* fallback odds from implied prob */
    var fallbackOdds = bestOdds ? bestOdds.price : parseFloat((1/best.prob).toFixed(2));
    if(!byGroup[grp]) byGroup[grp]=[];
    byGroup[grp].push({
      evId: ev.id,
      match: ev.home_team+' vs '+ev.away_team,
      home: ev.home_team, away: ev.away_team,
      league: (SPORTS_CFG[ev.sport_key]||{}).n||ev.sport_key,
      sport_key: ev.sport_key, group: grp,
      date: fmtDate(ev.commence_time),
      pick: best, odds: fallbackOdds,
      bestBookie: bestOdds, analysis: a, ev: ev
    });
  });

  /* Build one combinada per group */
  var combinadas = [];
  Object.keys(byGroup).forEach(function(grp){
    var picks = byGroup[grp].slice().sort(function(a,b){return b.pick.prob-a.pick.prob;}).slice(0,4);
    if(picks.length<2) return; /* need at least 2 legs */

    /* Combined prob (assuming independence) */
    var combProb = picks.reduce(function(p,x){return p*x.pick.prob;},1);
    /* Combined odds */
    var combOdds = picks.reduce(function(p,x){return p*x.odds;},1);
    /* Risk level */
    var rk = combProb>=0.50?'g':combProb>=0.35?'y':'r';
    /* EV */
    var ev_val = combProb*combOdds - 1;

    combinadas.push({
      group: grp, picks: picks,
      combProb: combProb, combOdds: combOdds,
      rk: rk, ev: ev_val
    });
  });

  combinadas.sort(function(a,b){return b.combProb-a.combProb;});
  return combinadas;
}

function makeReason(ev, mk, a) {
  var ip = a.ip;
  var hP = Math.round((ip[ev.home_team]||0)*100);
  var aP = Math.round((ip[ev.away_team]||0)*100);
  var dP = Math.round((ip['Draw']||0)*100);
  if(mk.cat==='1X2'&&mk.key==='home')
    return 'Cuotas del mercado implican '+hP+'% para '+ev.home_team+'. Modelo ajustado: '+p0(mk.prob)+'%. Lambda esperado: '+a.pa.lH.toFixed(2)+' goles.';
  if(mk.cat==='1X2'&&mk.key==='away')
    return 'Cuotas implican '+aP+'% para '+ev.away_team+'. Modelo ajustado: '+p0(mk.prob)+'%. Lambda: '+a.pa.lA.toFixed(2)+' goles esperados.';
  if(mk.cat==='1X2'&&mk.key==='draw')
    return 'Mercado indica '+dP+'% de empate. Modelo Poisson confirma '+p0(mk.prob)+'% de probabilidad de empate.';
  if(mk.cat==='BTTS')
    return 'Lambda local '+a.pa.lH.toFixed(2)+' y visitante '+a.pa.lA.toFixed(2)+'. Alta probabilidad de gol de ambos equipos ('+p0(mk.prob)+'%).';
  if(mk.cat==='Goles')
    return 'Lambda total esperado: '+(a.pa.lH+a.pa.lA).toFixed(2)+' goles. Modelo Poisson estima '+p0(mk.prob)+'% de prob. para este mercado.';
  return 'Probabilidad combinada de '+p0(mk.prob)+'% basada en cuotas reales del mercado y ajuste Poisson.';
}

function loadSport(sport, cb) {
  if (!APP.keyValid) { if(cb) cb(); return; }
  setLoading('sport-'+sport, true);
  fetchOddsForSport(sport).then(function(data) {
    APP.events[sport] = data || [];
    APP.sugs = buildSuggestions(getAllEvents());
    setLoading('sport-'+sport, false);
    if(cb) cb();
    render();
  }).catch(function(e) {
    APP.errors['sport-'+sport] = e.message;
    setLoading('sport-'+sport, false);
    if(cb) cb();
    render();
  });
}

function loadScores(sport, cb) {
  if (!APP.keyValid) { if(cb) cb(); return; }
  setLoading('scores-'+sport, true);
  fetchScores(sport).then(function(data) {
    APP.scores[sport] = data || [];
    setLoading('scores-'+sport, false);
    if(cb) cb();
    render();
  }).catch(function(e) {
    APP.errors['scores-'+sport] = e.message;
    setLoading('scores-'+sport, false);
    if(cb) cb();
    render();
  });
}

function loadAll() {
  if (!APP.keyValid) { render(); return; }
  var sports = ['soccer_fifa_world_cup','soccer_conmebol_copa_libertadores',
    'soccer_chile_campeonato','soccer_epl','soccer_spain_la_liga'];
  var done=0;
  sports.forEach(function(s){
    loadSport(s, function(){
      done++;
      if(done===sports.length){
        APP.sugs = buildSuggestions(getAllEvents());
        APP.lastRefresh = new Date();
        render();
      }
    });
  });
}

function parseBest(ev, mktKey) {
  var map={};
  (ev.bookmakers||[]).forEach(function(bkr){
    var mkt=null;
    for(var i=0;i<(bkr.markets||[]).length;i++){if(bkr.markets[i].key===mktKey){mkt=bkr.markets[i];break;}}
    if(!mkt) return;
    mkt.outcomes.forEach(function(o){
      if(!map[o.name]) map[o.name]=[];
      map[o.name].push({bookie:bkr.key, title:bkr.title, price:o.price});
    });
  });
  return Object.keys(map).map(function(name){
    var arr=map[name].slice().sort(function(a,b){return b.price-a.price;});
    return {name:name, best:arr[0], all:arr, spread:(arr[0].price-arr[arr.length-1].price).toFixed(2)};
  });
}

  /* Best odds panel */

  return '<div class="g2" style="margin-bottom:12px">'
    +'<div style="background:var(--bg3);border-radius:var(--rs);padding:12px">'
    +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Probabilidades</div>'
    +'<div class="donut-wrap">'+donut+'</div></div>'
    +'<div style="background:var(--bg3);border-radius:var(--rs);padding:12px">'
    +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Marcadores probables</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">'+topScores+'</div></div></div>'
    +'<div style="background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:10px">'
    +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Cuotas comparadas</div>'
    +oddsPanel+'</div>'
    +'<div style="background:var(--bg3);border-radius:var(--rs);padding:12px">'
    +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Todos los mercados</div>'
    +'<table class="tbl"><thead><tr><th>Mercado</th><th class="c">Prob.</th><th class="c">Señal</th></tr></thead>'
    +'<tbody>'+mktsRows+'</tbody></table></div>';
}

function matchCardHtml(ev, filterCat) {
  var a = analyzeEvent(ev);
  if (!a) return '';
  var mkts = filterCat&&filterCat!=='all' ? a.mkts.filter(function(m){return m.cat===filterCat;}) : a.mkts;
  if (!mkts.length) return '';
  var isOpen = APP.expandedMatch===ev.id;
  var top3 = a.mkts.slice(0,3);
  var pills = top3.map(function(m){
    return '<div class="pill '+m.rk+'">'+m.name+' '+p0(m.prob)+'%</div>';
  }).join('');
  var live = (ev.completed===false && ev.scores) ? '<div class="live-tag">LIVE</div>' : '';
  var detail = isOpen ? matchDetailHtml(ev,a) : '';
  return '<div class="mc'+(isOpen?' open':'')+'" onclick="toggleMatch(\''+ev.id+'\',event)">'
    +'<div class="mc-top"><div class="mc-league">'+sportName(ev.sport_key)+'</div>'
    +'<div style="display:flex;align-items:center;gap:6px">'+live+'<div class="mc-time">'+fmtDate(ev.commence_time)+'</div></div></div>'
    +'<div class="mc-body">'
    +'<div class="mc-team"><div class="mc-tn">'+ev.home_team+'</div></div>'
    +'<div class="mc-vs"><div class="mc-vs-txt">VS</div>'
    +'<div class="mc-vs-prob">'+p0(a.pa.pH)+'·'+p0(a.pa.pD)+'·'+p0(a.pa.pA)+'</div></div>'
    +'<div class="mc-team r"><div class="mc-tn">'+ev.away_team+'</div></div></div>'
    +'<div class="mc-pills">'+pills+'</div>'
    +'<div class="mc-detail">'+detail+'</div>'
    +'</div>';
}

      +'</div><div style="text-align:right;flex-shrink:0">'
      +'<div class="sug-pct" style="color:'+rCol(s.rk)+'">'+p0(s.prob)+'%</div>'

function renderMatches() {
  var sportKeys = Object.keys(SPORTS_CFG);
  var curSport = APP.sport;
  var events = getAllEvents().filter(function(e){ return e.sport_key===curSport; });
  var isLoading = APP.loading['sport-'+curSport];

  var groups = {};
  sportKeys.forEach(function(k){
    var g=(SPORTS_CFG[k]||{}).g||'Otros';
    if(!groups[g]) groups[g]=[];
    groups[g].push(k);
  });

  var groupChips = Object.keys(groups).map(function(g){
    var active = groups[g].indexOf(curSport)>=0;
    return '<button class="chip'+(active?' on':'')+'" onclick="setGroup(\''+g+'\')">'
      +({'Mundial':'🌍','Sudamérica':'🌎','Europa':'🏟','Tenis':'🎾'}[g]||'⚽')+' '+g+'</button>';
  }).join('');

  var sportOpts = (groups[(SPORTS_CFG[curSport]||{}).g]||[curSport]).map(function(k){
    return '<option value="'+k+'"'+(curSport===k?' selected':'')+'>'+sportName(k)+'</option>';
  }).join('');

  var body;
  if(isLoading){
    body='<div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Cargando partidos reales...</div></div>';
  } else if(!events.length){
    body='<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">Sin partidos disponibles</div>'
      +'<div class="empty-sub">Esta competición no tiene fixtures activos ahora.<br>Prueba con otra liga.</div></div>';
  } else {
    body=events.map(function(ev){ return matchCardHtml(ev, APP.filterCat); }).join('');
  }

  var filterChips=[['all','Todos'],['Goles','Goles'],['BTTS','BTTS'],['1X2','1X2'],['DC','DC']].map(function(x){
    return '<button class="chip'+(APP.filterCat===x[0]?' on':'')+'" onclick="APP.filterCat=\''+x[0]+'\';render()">'+x[1]+'</button>';
  }).join('');

  return '<div class="sh"><div class="sh-title">Partidos</div>'+refreshBtn('matches','refreshMatches()')+'</div>'
    +usageBarHtml()
    +'<div class="chips">'+groupChips+'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<select class="sel" style="flex:1;min-width:180px" onchange="APP.sport=this.value;refreshMatches()">'+sportOpts+'</select>'
    +'</div>'
    +'<div class="chips">'+filterChips+'</div>'
    +body;
}

function renderScores() {

  var isLoading = APP.loading['scores-'+sport];

  var sportOpts = Object.keys(SPORTS_CFG).map(function(k){
    return '<option value="'+k+'"'+(sport===k?' selected':'')+'>'+SPORTS_CFG[k].n+'</option>';

  var body;

    body='<div class="loading-wrap"><div class="spinner"></div><div class="loading-txt">Cargando resultados...</div></div>';

    body='<div class="notice info">ℹ️ Añade tu API Key para ver resultados y marcadores reales.</div>';
  } else if(!data.length){
    body='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Sin resultados recientes</div>'
      +'<div class="empty-sub">No hay resultados de los últimos 3 días para esta competición.</div></div>';
  } else {
    body=data.map(function(ev){
      var home=ev.home_team, away=ev.away_team;
      var sc=ev.scores||null;
      var hScore=sc?((sc.find(function(s){return s.name===home;})||{}).score||'-'):'-';
      var aScore=sc?((sc.find(function(s){return s.name===away;})||{}).score||'-'):'-';
      var status=ev.completed?'Finalizado':ev.last_update?'En curso':'Pendiente';
      var statusCol=ev.completed?'var(--t3)':status==='En curso'?'var(--green)':'var(--yellow)';
      return '<div class="score-card">'
        +'<div class="score-hdr"><div class="score-league">'+sportName(ev.sport_key)+'</div>'
        +'<div class="score-status" style="color:'+statusCol+'">'+status+'</div></div>'
        +'<div class="score-teams">'
        +'<div class="score-team">'+home+'</div>'
        +'<div class="score-result">'+hScore+' — '+aScore+'</div>'
        +'<div class="score-team r">'+away+'</div>'
        +'</div></div>';
    }).join('');
  }

  return '<div class="sh"><div class="sh-title">Resultados recientes</div>'+refreshBtn('scores','refreshScores()')+'</div>'
    +usageBarHtml()
    +'<select class="sel" style="width:100%;margin-bottom:12px" onchange="APP.sport=this.value;refreshScores()">'+sportOpts+'</select>'
    +body;
}

function renderTracker() {
  var bets=APP.bets;
  var won=bets.filter(function(b){return b.r==='W';}).length;
  var lost=bets.filter(function(b){return b.r==='L';}).length;
  var pend=bets.filter(function(b){return b.r==='P';}).length;
  var eff=(won+lost)>0?Math.round(won/(won+lost)*100)+'%':'—';

  var rows=bets.length?bets.map(function(b,i){
    var ic=b.r==='W'?'✅':b.r==='L'?'❌':'⏳';
    var ibg=b.r==='W'?'var(--gbg)':b.r==='L'?'var(--rbg)':'var(--ybg)';
    var btns=b.r==='P'
      ?'<button class="tr-btn" onclick="updBet('+i+',\'W\')" style="background:var(--gbg);color:var(--green);border-color:var(--gbr)">✓</button>'
       +'<button class="tr-btn" onclick="updBet('+i+',\'L\')" style="background:var(--rbg);color:var(--red);border-color:var(--rbr)">✗</button>'
      :'';
    btns+='<button class="tr-btn" onclick="delBet('+i+')" style="background:var(--bg4);color:var(--t3)">🗑</button>';
    return '<div class="tr-row"><div class="tr-icon" style="background:'+ibg+'">'+ic+'</div>'
      +'<div class="tr-info"><div class="tr-m">'+b.match+'</div>'
      +'<div class="tr-s">'+b.pred+' · '+p0(b.prob)+'% · '+b.date+'</div></div>'
      +'<div class="tr-btns">'+btns+'</div></div>';
  }).join(''):'';

  return '<div class="sh"><div class="sh-title">Tracker personal</div>'
    +'<div class="sh-action" onclick="addBetManual()">+ Añadir</div></div>'
    +'<div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="kpi"><div class="kpi-l">Acertadas</div><div class="kpi-v" style="color:var(--green)">'+won+'</div><div class="kpi-s up">'+eff+' efectividad</div></div>'
    +'<div class="kpi"><div class="kpi-l">Falladas</div><div class="kpi-v" style="color:var(--red)">'+lost+'</div><div class="kpi-s"> </div></div>'
    +'<div class="kpi"><div class="kpi-l">Pendientes</div><div class="kpi-v" style="color:var(--yellow)">'+pend+'</div><div class="kpi-s"> </div></div>'
    +'</div>'
    +(bets.length?'<div class="tr-card">'+rows+'</div>'
      :'<div class="empty"><div class="empty-icon">🎯</div><div class="empty-title">Sin picks registrados</div>'
      +'<div class="empty-sub">Usa el botón "+ Tracker" en Picks o añade manualmente.</div>'
      +'<button onclick="addBetManual()" style="margin-top:14px;padding:9px 20px;background:var(--abg);border:1px solid var(--abr);border-radius:var(--rs);color:var(--a2);font-size:12px;font-weight:600;cursor:pointer">+ Añadir pick</button></div>');
}

/* ═══════════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════════ */
function render() {
  var v=document.getElementById('view');
  if(!v) return;
  try{
    if(APP.tab==='dash')    v.innerHTML=renderDash();
    else if(APP.tab==='sugs')    v.innerHTML=renderSugs();
    else if(APP.tab==='matches') v.innerHTML=renderMatches();
    else if(APP.tab==='odds')    v.innerHTML=renderOdds();
    else if(APP.tab==='scores')  v.innerHTML=renderScores();
    else if(APP.tab==='tracker') v.innerHTML=renderTracker();
  }catch(e){ v.innerHTML='<div class="notice err">Error: '+e.message+'</div>'; console.error(e); }
}

/* ═══════════════════════════════════════════════
   NAVIGATION & INTERACTIONS
═══════════════════════════════════════════════ */
function nav(t) {
  APP.tab=t;
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  var el=document.getElementById('nt-'+t);
  if(el) el.classList.add('on');
  render();
}
function navHighConf() {
  APP.tab='sugs'; APP.minProb=65; APP.filterCat='all';
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  var el=document.getElementById('nt-sugs'); if(el) el.classList.add('on');
  render();
}
function setGroup(g) {
  var keys=Object.keys(SPORTS_CFG);
  for(var i=0;i<keys.length;i++){
    if(SPORTS_CFG[keys[i]].g===g){APP.sport=keys[i];break;}
  }
  refreshMatches();
}
function toggleMatch(id,e) {
  if(e&&e.target&&e.target.closest&&e.target.closest('button,select,input,a')) return;
  APP.expandedMatch=APP.expandedMatch===id?null:id;
  render();
}

/* REFRESH ACTIONS */
function refreshDash() {
  setLoading('dash',true); render();
  loadAll();
}
function refreshMatches() {
  loadSport(APP.sport, function(){ render(); });
  render();
}
function refreshScores() {
  loadScores(APP.sport, function(){ render(); });
  render();
}

/* MODAL */
function openModal(){ document.getElementById('modal').classList.add('on'); }
function closeModal(){ document.getElementById('modal').classList.remove('on'); }

function testAndSave() {
  var k=(document.getElementById('m-odds').value||'').trim();
  var res=document.getElementById('m-test-result');
  if(!k||k.length<20){ res.style.color='var(--red)'; res.textContent='Key muy corta. Debe tener ~32 caracteres.'; return; }
  res.style.color='var(--t3)'; res.textContent='Verificando key...';
  testKey(k).then(function(sports){
    APP.key=k; APP.keyValid=true;
    localStorage.setItem('biq_key',k);
    res.style.color='var(--green)';
    res.textContent='✓ Key válida. '+sports.length+' deportes disponibles.';
    updateStatus();
    setTimeout(function(){
      closeModal();
      loadAll();
    }, 800);
  }).catch(function(e){
    APP.keyValid=false;
    res.style.color='var(--red)';
    if(e.message==='KEY_INVALID') res.textContent='✗ Key inválida. Cópiala completa desde the-odds-api.com';
    else if(e.message==='LIMIT')  res.textContent='✗ Límite de requests alcanzado (500/mes).';
    else res.textContent='✗ Error: '+e.message;
  });
}

/* TRACKER */
function addBet(match,pred,prob){
  APP.bets.unshift({match:match,pred:pred,prob:prob,date:new Date().toLocaleDateString('es'),r:'P'});
  localStorage.setItem('biq_bets',JSON.stringify(APP.bets));
  alert('Añadido al tracker');
}
function addBetManual(){
  var m=prompt('Partido:'); if(!m) return;
  var p=prompt('Predicción:'); if(!p) return;
  var pb=parseFloat(prompt('Probabilidad decimal (ej: 0.72):')||'0.5');
  APP.bets.unshift({match:m,pred:p,prob:isNaN(pb)?0.5:pb,date:new Date().toLocaleDateString('es'),r:'P'});
  localStorage.setItem('biq_bets',JSON.stringify(APP.bets));
  render();
}
function updBet(i,r){ APP.bets[i].r=r; localStorage.setItem('biq_bets',JSON.stringify(APP.bets)); render(); }
function delBet(i){ APP.bets.splice(i,1); localStorage.setItem('biq_bets',JSON.stringify(APP.bets)); render(); }

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
(function init() {
  if (APP.key) {
    document.getElementById('m-odds').value = APP.key;
    testKey(APP.key).then(function(){
      APP.keyValid = true;
      updateStatus();
      loadAll();
    }).catch(function(){
      APP.keyValid = false;
      updateStatus();
      render();
    });
  } else {
    render();
  }
})();

/* Auto-refresh cada 5 minutos si hay key activa */
setInterval(function(){
  if(APP.keyValid && (APP.tab==='odds'||APP.tab==='matches')){
    loadSport(APP.sport);
  }
}, 300000);
</script>
