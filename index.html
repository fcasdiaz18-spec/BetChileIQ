<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BetIQ Chile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#050810;--bg1:#080C18;--bg2:#0D1220;--bg3:#131828;--bg4:#1A2035;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.16);
  --t1:#EEF3FF;--t2:#8B96BB;--t3:#50597A;
  --blue:#38BFFF;--blue2:#60CFFF;--bluebg:rgba(56,191,255,.1);--bluebr:rgba(56,191,255,.28);
  --green:#00E676;--gbg:rgba(0,230,118,.09);--gbr:rgba(0,230,118,.25);
  --yellow:#FFD600;--ybg:rgba(255,214,0,.09);--ybr:rgba(255,214,0,.25);
  --red:#FF4545;--rbg:rgba(255,69,69,.09);--rbr:rgba(255,69,69,.25);
  --accent:#38BFFF;--a2:#60CFFF;--abg:rgba(56,191,255,.1);--abr:rgba(56,191,255,.28);
  --r:12px;--rs:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg0);color:var(--t1);font-size:13px;min-height:100vh;overflow-x:hidden}
.hdr{position:sticky;top:0;z-index:200;background:rgba(5,8,16,.94);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);height:54px;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.chile-flag{font-size:22px;line-height:1}
.logo{font-size:20px;font-weight:800;letter-spacing:-1px}
.logo span{color:var(--blue)}
.hdr-r{display:flex;align-items:center;gap:8px}
.spill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--b2);background:var(--bg3)}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot.live{background:var(--green);animation:blink 2s infinite}
.sdot.demo{background:var(--yellow)}
.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hbtn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b2);background:var(--bg3);color:var(--t2)}
.hbtn:hover{color:var(--t1);border-color:var(--b3)}
.hbtn.ac{background:var(--abg);border-color:var(--abr);color:var(--blue)}
.nav{background:var(--bg1);border-bottom:1px solid var(--b1);display:flex;overflow-x:auto;padding:0 6px}
.ntab{padding:12px 13px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t3);white-space:nowrap;border-bottom:2px solid transparent}
.ntab:hover{color:var(--t2)}
.ntab.on{color:var(--blue);border-bottom-color:var(--blue)}
.view{padding:14px 16px;max-width:900px;margin:0 auto;min-height:calc(100vh - 104px)}
.tbar{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.tbar-label{font-size:11px;color:var(--t3);white-space:nowrap}
.tchip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t2);white-space:nowrap}
.tchip.on{background:var(--abg);color:var(--blue);border-color:var(--abr)}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r)}
.cp{padding:14px 16px}
.krow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.krow{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px}
.kl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.kv{font-size:26px;font-weight:800;line-height:1;letter-spacing:-1px}
.ks{font-size:10px;color:var(--t3);margin-top:4px}
.ks.up{color:var(--green)}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.bdg.g{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.bdg.y{background:var(--ybg);color:var(--yellow);border:1px solid var(--ybr)}
.bdg.r{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
.sig{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;text-transform:uppercase}
.sig.AP{background:var(--gbg);color:var(--green)}
.sig.ES{background:var(--ybg);color:var(--yellow)}
.sig.EV{background:var(--rbg);color:var(--red)}
.pb{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:4px}
.pbf{height:100%;border-radius:2px}
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.mc.open{border-color:var(--abr)}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer}
.mc-lg{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.mc-body{display:flex;align-items:center;padding:0 14px 10px;gap:6px;cursor:pointer}
.mc-team{flex:1}
.mc-team.r{text-align:right}
.mc-tn{font-size:13px;font-weight:700}
.mc-vs{text-align:center;flex-shrink:0;padding:0 8px}
.mc-vst{font-size:10px;color:var(--t3);font-weight:700}
.mc-mkts{padding:0 14px 4px}
.mkt-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--rs);background:var(--bg3);margin-bottom:5px}
.mkt-left{display:flex;align-items:center;gap:8px}
.mkt-icon{font-size:13px;flex-shrink:0}
.mkt-name{font-size:11px;font-weight:600;color:var(--t1)}
.mkt-sub{font-size:10px;color:var(--t3);margin-top:1px}
.mkt-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mkt-pct{font-size:14px;font-weight:800}
.rec-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
.rec-tag.apostar{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.rec-tag.esperar{background:var(--ybg);color:var(--yellow);border:1px solid var(--ybr)}
.rec-tag.evitar{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
.mc-detail{display:none;border-top:1px solid var(--b1);padding:14px}
.mc.open .mc-detail{display:block}
.mc-track-btn{margin-top:10px;width:100%;padding:9px;background:var(--abg);border:1px solid var(--abr);border-radius:var(--rs);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer}
.sug{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:10px}
.sug.top{border-color:var(--abr);background:linear-gradient(135deg,var(--bg2),rgba(56,191,255,.05))}
.sug-hdr{display:flex;gap:10px;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sug-m{font-size:12px;font-weight:700}
.sug-s{font-size:10px;color:var(--t3);margin-top:2px}
.sug-pct{font-size:30px;font-weight:800;line-height:1;flex-shrink:0}
.sug-box{background:var(--bg3);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px}
.sug-pred{font-size:14px;font-weight:700;margin-bottom:3px}
.sug-why{font-size:11px;color:var(--t2);line-height:1.65}
.sug-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.combi{background:var(--bg2);border:2px solid var(--abr);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.combi-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.combi-strip{display:flex;border-bottom:1px solid var(--b1)}
.combi-stat{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--b1)}
.combi-stat:last-child{border-right:none}
.cs-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cs-val{font-size:15px;font-weight:800}
.leg{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:8px}
.leg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.leg-num{width:22px;height:22px;background:var(--abg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--blue);flex-shrink:0}
.leg-match{font-size:12px;font-weight:700}
.leg-sub{font-size:10px;color:var(--t3)}
.leg-pick{background:var(--bg4);border-radius:6px;padding:8px 10px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.leg-pred{font-size:13px;font-weight:800}
.leg-cat{font-size:10px;color:var(--t3);margin-top:2px}
.leg-odds{font-size:18px;font-weight:800;color:var(--yellow)}
.leg-bk{font-size:9px;color:var(--t3);margin-top:2px;text-align:right}
.leg-scores{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.score-chip{background:var(--bg4);border-radius:5px;padding:3px 7px;font-size:10px;font-weight:700}
.leg-bks{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px}
.bkc{background:var(--bg4);border-radius:5px;padding:4px 7px;text-align:center;flex-shrink:0;min-width:58px}
.bkc.best{background:var(--gbg);border:1px solid var(--gbr)}
.bkn{font-size:8px;color:var(--t3);margin-bottom:1px}
.bkp{font-size:11px;font-weight:700}
.bkp.best{color:var(--green)}
.leg-why{background:rgba(56,191,255,.07);border-left:2px solid var(--blue);border-radius:0 6px 6px 0;padding:7px 10px;font-size:11px;color:var(--t2);line-height:1.65}
.leg-why-lbl{font-size:9px;color:var(--blue);font-weight:700;margin-bottom:3px}
.oe{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.oe-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;gap:8px}
.oe-m{font-size:13px;font-weight:700}
.oe-meta{font-size:10px;color:var(--t3);margin-top:2px}
.oe-time{font-size:11px;color:var(--blue);font-weight:600;flex-shrink:0}
.oe-ocs{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.oe-oc{background:var(--bg3);border-radius:var(--rs);padding:10px 12px}
.oe-oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.oe-oc-n{font-size:12px;font-weight:600}
.oe-bk{font-size:10px;color:var(--t2);margin-top:2px;display:flex;align-items:center;gap:4px}
.bkdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.oe-price{font-size:22px;font-weight:800;line-height:1}
.oe-impl{font-size:9px;color:var(--t3)}
.bk-scroll{display:flex;gap:4px;overflow-x:auto;margin-top:6px;padding-bottom:2px}
.sc-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.sc-hdr{display:flex;justify-content:space-between;margin-bottom:8px}
.sc-lg{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.sc-st{font-size:10px;font-weight:700}
.sc-teams{display:flex;align-items:center;justify-content:space-between;gap:6px}
.sc-t{flex:1;font-size:13px;font-weight:600}
.sc-t.r{text-align:right}
.sc-res{text-align:center;font-size:20px;font-weight:800;padding:0 10px;color:var(--blue)}
.cht{width:100%;border-collapse:collapse}
.cht th{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;border-bottom:1px solid var(--b1);text-align:center;white-space:nowrap}
.cht th:first-child,.cht th:nth-child(2){text-align:left}
.cht td{padding:8px;font-size:12px;border-bottom:1px solid var(--b1);text-align:center;vertical-align:middle}
.cht td:first-child{color:var(--t3);font-size:11px;width:24px}
.cht td:nth-child(2){text-align:left;font-weight:600}
.cht tr:last-child td{border:none}
.cht tr.ucl td{border-left:3px solid var(--blue)}
.cht tr.rel td{border-left:3px solid var(--red)}
.pts{font-weight:800;color:var(--blue)}
.cht-form{display:flex;gap:2px;justify-content:center}
.fd{width:14px;height:14px;border-radius:3px;font-size:7px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fd.W{background:var(--gbg);color:var(--green)}
.fd.D{background:var(--ybg);color:var(--yellow)}
.fd.L{background:var(--rbg);color:var(--red)}
.news-grid{display:flex;flex-direction:column;gap:10px}
.news-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;display:flex}
.news-img{width:80px;min-width:80px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:28px}
.news-body{padding:10px 12px;flex:1;min-width:0}
.news-tag{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.news-title{font-size:12px;font-weight:700;line-height:1.45;margin-bottom:4px}
.news-meta{font-size:10px;color:var(--t3)}
.trc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.tr-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b1)}
.tr-row:last-child{border:none}
.tr-ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-m{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-s{font-size:10px;color:var(--t3);margin-top:2px}
.tr-btns{display:flex;gap:4px;flex-shrink:0}
.tr-btn{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid transparent;background:transparent}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-t{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.sh-a{font-size:11px;color:var(--blue);cursor:pointer;font-weight:500}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px}
.chip{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--b2);background:transparent;color:var(--t2);white-space:nowrap}
.chip.on{background:var(--abg);color:var(--blue);border-color:var(--abr)}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.qbtn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r);border:1px solid var(--b2);background:var(--bg3);cursor:pointer;text-align:left}
.qbtn:hover{border-color:var(--b3);background:var(--bg4)}
.qi{font-size:22px;flex-shrink:0}
.ql{font-size:12px;font-weight:700}
.qs{font-size:10px;color:var(--t3);margin-top:2px}
.notice{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--rs);font-size:11px;margin-bottom:12px}
.notice.info{background:var(--abg);border:1px solid var(--abr);color:var(--blue)}
.notice.warn{background:var(--ybg);border:1px solid var(--ybr);color:var(--yellow)}
.lwrap{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px}
.spin{width:26px;height:26px;border:2px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:12px;color:var(--t3)}
.empty{text-align:center;padding:40px 20px}
.ei{font-size:36px;margin-bottom:10px}
.et{font-size:13px;color:var(--t2);margin-bottom:4px}
.es{font-size:11px;color:var(--t3)}
.sel{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);padding:8px 12px;color:var(--t1);font-size:12px;outline:none;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;padding:24px;width:100%;max-width:420px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:8px}
.modal p{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.65}
.modal label{font-size:11px;color:var(--t3);display:block;margin-bottom:5px}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);padding:10px 13px;color:var(--t1);font-size:13px;outline:none;margin-bottom:12px}
.modal input:focus{border-color:var(--blue)}
.mbtns{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;padding:10px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:none}
.mbtn.pri{background:var(--blue);color:#000}
.mbtn.sec{background:var(--bg4);color:var(--t2)}
.ubar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:12px;flex-wrap:wrap}
.ul{font-size:10px;color:var(--t3);white-space:nowrap}
.utrack{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;min-width:40px}
.ufill{height:100%;border-radius:2px}
.uval{font-size:11px;font-weight:700;white-space:nowrap}
.rbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--abr);background:var(--abg);color:var(--blue);white-space:nowrap}
.ri{display:inline-block}
.tsw{display:flex;gap:3px;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:14px}
.tsw-btn{flex:1;padding:8px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:var(--t3)}
.tsw-btn.on{background:var(--bg2);color:var(--blue);font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.g2{grid-template-columns:1fr}}
.diag{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:12px}
.diag-row{font-size:11px;color:var(--t2);padding:5px 0;border-bottom:1px solid var(--b1)}
.diag-row:last-child{border:none}
.diag-row b{color:var(--red)}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo-wrap">
    <div class="chile-flag">CL</div>
    <div class="logo">Bet<span>IQ</span></div>
  </div>
  <div class="hdr-r">
    <div class="spill"><div class="sdot demo" id="sdot"></div><span id="stxt">Demo</span></div>
    <button class="hbtn ac" onclick="openModal()">Keys</button>
  </div>
</header>

<nav class="nav">
  <button class="ntab on"  id="nt-dash"    onclick="nav('dash')">Inicio</button>
  <button class="ntab"     id="nt-chile"   onclick="nav('chile')">Liga Chile</button>
  <button class="ntab"     id="nt-picks"   onclick="nav('picks')">Picks</button>
  <button class="ntab"     id="nt-odds"    onclick="nav('odds')">Cuotas</button>
  <button class="ntab"     id="nt-scores"  onclick="nav('scores')">Resultados</button>
  <button class="ntab"     id="nt-news"    onclick="nav('news')">Noticias</button>
  <button class="ntab"     id="nt-tracker" onclick="nav('tracker')">Tracker</button>
</nav>

<div class="view" id="view"></div>

<div class="overlay" id="modal">
<div class="modal">
  <h3>API Keys</h3>
  <p>Con tu key de The Odds API toda la app usa datos reales. <a href="https://the-odds-api.com" target="_blank" style="color:var(--blue)">Obtener key gratuita</a></p>
  <label>The Odds API Key</label>
  <input id="m-odds" type="password" placeholder="~32 caracteres...">
  <div id="m-res" style="font-size:11px;margin-bottom:10px;min-height:16px"></div>
  <div class="mbtns">
    <button class="mbtn sec" onclick="closeModal()">Cancelar</button>
    <button class="mbtn pri" onclick="testAndSave()">Verificar y Guardar</button>
  </div>
</div>
</div>

<script>
'use strict';
var A={
  tab:'dash', key:localStorage.getItem('biq_k')||'', kv:false,

function filterByTime(events){
  var now=nowTs(),tf=A.timeFilter,limit;
  if(tf==='week')limit=7*24*3600000;

    return t>=now-24*3600000 && t<=now+limit;

function fac(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
function poi(l,k){return Math.pow(l,k)*Math.exp(-l)/fac(k);}
function impliedProbs(ev){
  var map={};
  (ev.bookmakers||[]).forEach(function(b){
    var m=null;
    for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='h2h'){m=b.markets[i];break;}}
    if(!m)return;
    m.outcomes.forEach(function(o){if(!map[o.name]||o.price>map[o.name])map[o.name]=o.price;});
  });
  var ks=Object.keys(map);
  if(!ks.length)return null;
  var sum=ks.reduce(function(s,k){return s+(1/map[k]);},0);
  var pr={};
  ks.forEach(function(k){pr[k]=(1/map[k])/sum;});
  return pr;
}
function calcPoi(pH,pA){
  var pD=Math.max(0,1-pH-pA);
  var lH=Math.max(0.5,-Math.log(Math.max(0.01,1-pH))*1.8);
  var lA=Math.max(0.5,-Math.log(Math.max(0.01,1-pA))*1.8);
  var max=7,o15=0,o25=0,o35=0,btts=0,top=[];
  for(var i=0;i<=max;i++)for(var j=0;j<=max;j++){
    var p=poi(lH,i)*poi(lA,j);
    if(i+j>1.5)o15+=p;if(i+j>2.5)o25+=p;if(i+j>3.5)o35+=p;
    if(i>=1&&j>=1)btts+=p;
    if(i<=4&&j<=4)top.push({h:i,a:j,p:p});
  }
  top.sort(function(a,b){return b.p-a.p;});
  return{pH:pH,pA:pA,pD:pD,lH:lH,lA:lA,o15:o15,o25:o25,o35:o35,btts:btts,top:top.slice(0,6)};
}
function analyzeEv(ev){
  var ip=impliedProbs(ev);
  if(!ip)return null;
  var pH=ip[ev.home_team]||0.33,pA=ip[ev.away_team]||0.33;
  var tot=pH+pA+(ip['Draw']||0);
  pH/=tot;pA/=tot;
  var pD=Math.max(0,1-pH-pA);
  var pa=calcPoi(pH,pA);pa.pD=pD;
  var ou25=null;
  (ev.bookmakers||[]).forEach(function(b){
    var m=null;
    for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='totals'){m=b.markets[i];break;}}
    if(!m)return;
    m.outcomes.forEach(function(o){if(o.name==='Over'&&o.point===2.5&&(!ou25||o.price>ou25.price))ou25={price:o.price};});
  });
  if(ou25)pa.o25=Math.max(pa.o25,1/ou25.price*0.9);
  var mkts=[
    {cat:'1X2',icon:'1',name:'Victoria '+ev.home_team,prob:pa.pH,key:'home'},
    {cat:'1X2',icon:'X',name:'Empate',prob:pa.pD,key:'draw'},
    {cat:'1X2',icon:'2',name:'Victoria '+ev.away_team,prob:pa.pA,key:'away'},
    {cat:'BTTS',icon:'G',name:'Ambos anotan',prob:pa.btts,key:'btts'},
    {cat:'Goles',icon:'O',name:'Over 1.5 goles',prob:pa.o15,key:'o15'},
    {cat:'Goles',icon:'O',name:'Over 2.5 goles',prob:pa.o25,key:'o25'},
    {cat:'Goles',icon:'O',name:'Over 3.5 goles',prob:pa.o35,key:'o35'},
    {cat:'Corners',icon:'C',name:'Over 8.5 corners',prob:Math.min(0.82,pa.o25*1.1+0.05),key:'c85'},
    {cat:'DC',icon:'D',name:'DC ('+ev.home_team+' o Emp)',prob:pa.pH+pa.pD,key:'dc_h'},
    {cat:'DC',icon:'D',name:'DC ('+ev.away_team+' o Emp)',prob:pa.pA+pa.pD,key:'dc_a'}
  ];
  mkts.forEach(function(m){
    m.sig=m.prob>=0.65?'AP':m.prob>=0.48?'ES':'EV';
    m.rk=m.prob>=0.65?'g':m.prob>=0.48?'y':'r';
  });
  mkts.sort(function(a,b){return b.prob-a.prob;});
  return{pa:pa,mkts:mkts,ip:ip};
}
function buildSugs(evs){
  var pool=[];
  evs.forEach(function(ev){
    var a=analyzeEv(ev);
    if(!a)return;
    a.mkts.forEach(function(mk){
      if(mk.prob>=0.60)pool.push({
        evId:ev.id,match:ev.home_team+' vs '+ev.away_team,home:ev.home_team,away:ev.away_team,
        league:(SC[ev.sport_key]||{}).n||ev.sport_key,group:(SC[ev.sport_key]||{}).g||'Otros',
        date:fmtDate(ev.commence_time),cat:mk.cat,pred:mk.name,prob:mk.prob,rk:mk.rk,sig:mk.sig,
        reason:buildReason(ev,mk,a),analysis:a,ev:ev
      });
    });
  });
  pool.sort(function(a,b){return b.prob-a.prob;});
  var mc={},out=[];
  pool.forEach(function(p){if(!mc[p.evId]&&out.length<10){mc[p.evId]=1;out.push(p);}});
  return out;
}
function buildReason(ev,mk,a){
  var ip=a.ip;
  var hP=Math.round((ip[ev.home_team]||0)*100);
  var aP=Math.round((ip[ev.away_team]||0)*100);
  var lH=a.pa.lH.toFixed(2),lA=a.pa.lA.toFixed(2);
  if(mk.key==='home')return 'Mercado implica '+hP+'% para '+ev.home_team+'. Modelo Poisson: '+p0(mk.prob)+'%. Lambda esperado: '+lH+' goles.';
  if(mk.key==='away')return 'Mercado implica '+aP+'% para '+ev.away_team+'. Modelo: '+p0(mk.prob)+'%. Lambda: '+lA+' goles como visitante.';
  if(mk.key==='draw')return 'Poisson indica '+p0(mk.prob)+'% de empate con lambdas L:'+lH+' V:'+lA+'.';
  if(mk.cat==='BTTS')return 'Lambda local '+lH+' y visitante '+lA+' sugieren goles de ambos. Prob: '+p0(mk.prob)+'%.';
  if(mk.cat==='Goles')return 'Total esperado: '+(a.pa.lH+a.pa.lA).toFixed(2)+' goles. '+mk.name+' con '+p0(mk.prob)+'%.';
  if(mk.cat==='Corners')return 'Estimado desde intensidad ofensiva: '+p0(mk.prob)+'%. xG total '+(a.pa.lH+a.pa.lA).toFixed(2)+'.';
  return 'Prob. combinada '+p0(mk.prob)+'% segun cuotas reales del mercado.';
}
function buildCombis(evs){
  var byGroup={};
  evs.forEach(function(ev){
    var a=analyzeEv(ev);
    if(!a)return;
    var grp=(SC[ev.sport_key]||{}).g||'Otros';
    var best=null;
    a.mkts.forEach(function(mk){if(mk.prob>=0.55&&(!best||mk.prob>best.prob))best=mk;});
    if(!best)return;
    var bestOdds=null;
    (ev.bookmakers||[]).forEach(function(b){
      var m=null;
      for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='h2h'){m=b.markets[i];break;}}
      if(!m)return;
      m.outcomes.forEach(function(o){
        var ok=(o.name===ev.home_team&&best.key==='home')||(o.name===ev.away_team&&best.key==='away')||(o.name==='Draw'&&best.key==='draw');
        if(ok&&(!bestOdds||o.price>bestOdds.price))bestOdds={price:o.price,bookie:b.key,title:b.title};
      });
    });
    var odds=bestOdds?bestOdds.price:parseFloat((1/best.prob*1.05).toFixed(2));
    if(!byGroup[grp])byGroup[grp]=[];
    byGroup[grp].push({evId:ev.id,match:ev.home_team+' vs '+ev.away_team,home:ev.home_team,away:ev.away_team,
      league:(SC[ev.sport_key]||{}).n||ev.sport_key,group:grp,date:fmtDate(ev.commence_time),
      pick:best,odds:odds,bestBookie:bestOdds,analysis:a,ev:ev});
  });
  var out=[];
  Object.keys(byGroup).forEach(function(g){
    var picks=byGroup[g].slice().sort(function(a,b){return b.pick.prob-a.pick.prob;}).slice(0,4);
    if(picks.length<2)return;
    var combP=picks.reduce(function(p,x){return p*x.pick.prob;},1);
    var combO=picks.reduce(function(p,x){return p*x.odds;},1);
    var rk=combP>=0.45?'g':combP>=0.30?'y':'r';
    out.push({group:g,picks:picks,combP:combP,combO:combO,rk:rk,ev:combP*combO-1});
  });
  out.sort(function(a,b){return b.combP-a.combP;});
  return out;
}

function parseBest(ev,mktKey){

  (ev.bookmakers||[]).forEach(function(b){
    var m=null;
    for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key===mktKey){m=b.markets[i];break;}}
    if(!m)return;
    m.outcomes.forEach(function(o){
      if(!map[o.name])map[o.name]=[];
      map[o.name].push({bookie:b.key,title:b.title,price:o.price,point:o.point});
    });
  });
  return Object.keys(map).map(function(name){
    var arr=map[name].slice().sort(function(a,b){return b.price-a.price;});
    return{name:name,best:arr[0],all:arr};
  });
}

function loadNews(){
  if(A.newsCache){render();return;}
  A.loading['news']=true;render();
  var prompt='Genera un JSON con 8 noticias deportivas reales y actualizadas de junio 2026 sobre Mundial FIFA, Copa Libertadores, Liga Chilena, lesiones y estadisticas. SOLO JSON, sin texto extra: [{"title":"...","tag":"Mundial/Libertadores/Liga Chile/Lesiones/Estadisticas","summary":"max 120 chars","time":"hace X horas"}]';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();})
  .then(function(d){
    var txt=(d.content&&d.content[0]&&d.content[0].text)||'[]';
    var clean=txt.replace(/```json|```/g,'').trim();
    try{A.newsCache=JSON.parse(clean);}catch(e){A.newsCache=fallbackNews();}
    A.loading['news']=false;render();
  }).catch(function(){A.newsCache=fallbackNews();A.loading['news']=false;render();});
}

      }).join('');
      return '<div class="oe-oc"><div class="oe-oc-top"><div><div class="oe-oc-n">'+oc.name+'</div>'
        +'<div class="oe-bk">Mejor: '+meta.l+'</div></div><div><div class="oe-price">'+oc.best.price.toFixed(2)+'</div></div></div>'
        +'<div class="bk-scroll">'+chips+'</div></div>';
    }).join('');
    return '<div class="oe"><div class="oe-hdr"><div><div class="oe-m">'+ev.home_team+' vs '+ev.away_team+'</div>'
      +'<div class="oe-meta">'+((ev.bookmakers||[]).length)+' casas - '+(MKT[A.market]||A.market)+'</div></div>'
      +'<div class="oe-time">'+fmtDate(ev.commence_time)+'</div></div><div class="oe-ocs">'+ocsHtml+'</div></div>';
  }).join(''):'<div class="empty"><div class="ei">?</div><div class="et">Sin partidos con cuotas</div></div>';
  return '<div class="sh"><div class="sh-t">Cuotas</div>'+rbtn('odds','refreshOdds()')+'</div>'
    +usageHtml()+timeBar()
    +'<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<select class="sel" style="flex:1;min-width:180px" onchange="A.sport=this.value;refreshOdds()">'+sportOpts+'</select>'
    +'<select class="sel" onchange="A.market=this.value;render()">'+mktOpts+'</select></div>'+body;
}
function renderScores(){
  var sp=A.sport;
  var data=A.scores[sp]||[];
  var sportOpts=Object.keys(SC).map(function(k){return '<option value="'+k+'"'+(sp===k?' selected':'')+'>'+SC[k].n+'</option>';}).join('');
  var body=!A.kv?'<div class="notice info">Anade tu API Key para resultados reales.</div>'
    :data.length?data.map(function(ev){
      var sc=ev.scores||[];
      function gs(name){var s=sc.find(function(x){return x.name===name;});return s?s.score:'-';}
      var st=ev.completed?'Finalizado':sc.length?'En vivo':'Pendiente';
      return '<div class="sc-card"><div class="sc-hdr"><div class="sc-lg">'+(SC[ev.sport_key]||{}).n+'</div><div class="sc-st">'+st+'</div></div>'
        +'<div class="sc-teams"><div class="sc-t">'+ev.home_team+'</div><div class="sc-res">'+gs(ev.home_team)+' - '+gs(ev.away_team)+'</div>'
        +'<div class="sc-t r">'+ev.away_team+'</div></div></div>';
    }).join('')
    :'<div class="empty"><div class="ei">?</div><div class="et">Sin resultados recientes</div></div>';
  return '<div class="sh"><div class="sh-t">Resultados</div>'+rbtn('scores','refreshScores()')+'</div>'
    +usageHtml()+timeBar()
    +'<select class="sel" style="width:100%;margin-bottom:12px" onchange="A.sport=this.value;refreshScores()">'+sportOpts+'</select>'+body;
}
function renderNews(){
  if(A.loading['news'])return '<div class="lwrap"><div class="spin"></div><div class="ltxt">Cargando noticias...</div></div>';
  if(!A.newsCache){loadNews();return '<div class="lwrap"><div class="spin"></div><div class="ltxt">Preparando feed...</div></div>';}
  var news=A.newsCache;
  return '<div class="sh"><div class="sh-t">Noticias</div>'+rbtn('news','A.newsCache=null;loadNews()')+'</div>'
    +'<div class="notice info">Feed generado con IA</div>'
    +'<div class="news-grid">'+news.map(function(n){
      return '<div class="news-card"><div class="news-img">'+(n.tag||'?').charAt(0)+'</div>'
        +'<div class="news-body"><div class="news-tag">'+n.tag+'</div><div class="news-title">'+n.title+'</div>'
        +'<div style="font-size:11px;color:var(--t2);margin:4px 0">'+n.summary+'</div>'
        +'<div class="news-meta">'+n.time+'</div></div></div>';
    }).join('')+'</div>';
}
function renderTracker(){
  var bets=A.bets;
  var won=bets.filter(function(b){return b.r==='W';}).length;
  var lost=bets.filter(function(b){return b.r==='L';}).length;
  var pend=bets.filter(function(b){return b.r==='P';}).length;
  var eff=(won+lost)?Math.round(won/(won+lost)*100)+'%':'--';
  var rows=bets.map(function(b,i){
    var ic=b.r==='W'?'W':b.r==='L'?'L':'P';
    var ibg=b.r==='W'?'var(--gbg)':b.r==='L'?'var(--rbg)':'var(--ybg)';
    var extra=b.r==='P'?'<button class="tr-btn" onclick="updB('+i+',\'W\')" style="background:var(--gbg);color:var(--green)">W</button>'
      +'<button class="tr-btn" onclick="updB('+i+',\'L\')" style="background:var(--rbg);color:var(--red)">L</button>':'';
    extra+='<button class="tr-btn" onclick="delB('+i+')" style="background:var(--bg4);color:var(--t3)">X</button>';
    return '<div class="tr-row"><div class="tr-ic" style="background:'+ibg+'">'+ic+'</div>'
      +'<div class="tr-info"><div class="tr-m">'+b.match+'</div><div class="tr-s">'+b.pred+' - '+p0(b.prob)+'% - '+b.date+'</div></div>'
      +'<div class="tr-btns">'+extra+'</div></div>';
  }).join('');
  return '<div class="sh"><div class="sh-t">Tracker</div><div class="sh-a" onclick="addBetManual()">Anadir</div></div>'
    +'<div class="krow" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="kpi"><div class="kl">Acertadas</div><div class="kv" style="color:var(--green)">'+won+'</div><div class="ks up">'+eff+'</div></div>'
    +'<div class="kpi"><div class="kl">Falladas</div><div class="kv" style="color:var(--red)">'+lost+'</div></div>'
    +'<div class="kpi"><div class="kl">Pendientes</div><div class="kv" style="color:var(--yellow)">'+pend+'</div></div></div>'
    +(bets.length?'<div class="trc">'+rows+'</div>':'<div class="empty"><div class="ei">T</div><div class="et">Sin picks registrados</div>'
    +'<button onclick="addBetManual()" style="margin-top:14px;padding:9px 20px;background:var(--abg);border:1px solid var(--abr);border-radius:var(--rs);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer">Anadir pick</button></div>');
}

function nav(t){
  A.tab=t;
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  var el=document.getElementById('nt-'+t);if(el)el.classList.add('on');
  render();
  if(t==='news'&&!A.newsCache)loadNews();
}
function navHC(){A.tab='picks';A.minP=65;A.fCat='all';A.picksTab='picks';
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  var el=document.getElementById('nt-picks');if(el)el.classList.add('on');render();}
function toggleMatch(id){A.expanded=A.expanded===id?null:id;render();}
function refreshChile(){loadSport('soccer_chile_campeonato').then(function(){A.lastRefresh=Date.now();render();});}
function refreshOdds(){loadSport(A.sport).then(function(){A.lastRefresh=Date.now();render();});}
function refreshScores(){loadScores(A.sport).then(render);}
function openModal(){document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function testAndSave(){
  var k=(document.getElementById('m-odds').value||'').trim();
  var res=document.getElementById('m-res');
  if(!k||k.length<20){res.style.color='var(--red)';res.textContent='Key muy corta.';return;}
  res.style.display='block';
    res.style.color='var(--t3)';res.textContent='Verificando Odds API...';
  testKey(k).then(function(sports){
    A.key=k;A.kv=true;localStorage.setItem('biq_k',k);
    res.style.color='var(--green)';res.textContent='Valida - '+sports.length+' deportes.';
    updateStatus();
    setTimeout(function(){closeModal();loadAll();},800);
  }).catch(function(e){
    A.kv=false;res.style.color='var(--red)';
    res.textContent=e.message==='KEY_INVALID'?'Key invalida.':e.message==='LIMIT'?'Limite alcanzado.':'Error: '+e.message;
  });
}
function updateStatus(){
  var d=document.getElementById('sdot'),t=document.getElementById('stxt');
  if(!d||!t)return;
  d.className='sdot '+(A.kv?'live':A.key?'err':'demo');
  t.textContent=A.kv?'En vivo':A.key?'Key error':'Demo';
}
function addBet(match,pred,prob){
  A.bets.unshift({match:match,pred:pred,prob:isNaN(prob)?0.6:prob,date:new Date().toLocaleDateString('es'),r:'P'});
  localStorage.setItem('biq_bets',JSON.stringify(A.bets));
  alert('Anadido al Tracker');
}
function addBetManual(){
  var m=prompt('Partido:');if(!m)return;
  var p=prompt('Prediccion:');if(!p)return;
  var pb=parseFloat(prompt('Probabilidad decimal (ej 0.72):')||'0.6');
  A.bets.unshift({match:m,pred:p,prob:isNaN(pb)?0.6:pb,date:new Date().toLocaleDateString('es'),r:'P'});
  localStorage.setItem('biq_bets',JSON.stringify(A.bets));render();
}
function updB(i,r){A.bets[i].r=r;localStorage.setItem('biq_bets',JSON.stringify(A.bets));render();}
function delB(i){A.bets.splice(i,1);localStorage.setItem('biq_bets',JSON.stringify(A.bets));render();}

function render(){
  var v=document.getElementById('view');if(!v)return;
  try{
    if(A.tab==='dash')v.innerHTML=renderDash();
    else if(A.tab==='chile')v.innerHTML=renderChile();
    else if(A.tab==='picks')v.innerHTML=renderPicks();
    else if(A.tab==='odds')v.innerHTML=renderOdds();
    else if(A.tab==='scores')v.innerHTML=renderScores();
    else if(A.tab==='news')v.innerHTML=renderNews();
    else if(A.tab==='tracker')v.innerHTML=renderTracker();
  }catch(e){v.innerHTML='<div class="notice info">Error: '+e.message+'</div>';console.error(e);}
}

(function(){
  if(A.key){
    document.getElementById('m-odds').value=A.key;
    testKey(A.key).then(function(){A.kv=true;updateStatus();loadAll();}).catch(function(){A.kv=false;updateStatus();render();});
  } else {
    A.sugs=buildSugs(DEMO);A.combis=buildCombis(DEMO);render();
  }
})();
var TWO_HOURS=2*60*60*1000;
setInterval(function(){if(A.kv)loadAll();},TWO_HOURS);
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&A.kv&&A.lastRefresh&&(Date.now()-A.lastRefresh)>=TWO_HOURS)loadAll();
});
</script>
</body>
</html>
