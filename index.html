<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BetIQ Chile</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#050810;--bg1:#080C18;--bg2:#0D1220;--bg3:#131828;--bg4:#1A2035;--bg5:#202840;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.16);
  --t1:#EEF3FF;--t2:#8B96BB;--t3:#50597A;
  --blue:#38BFFF;--blue2:#60CFFF;--bluebg:rgba(56,191,255,.1);--bluebr:rgba(56,191,255,.28);
  --green:#00E676;--gbg:rgba(0,230,118,.09);--gbr:rgba(0,230,118,.25);
  --yellow:#FFD600;--ybg:rgba(255,214,0,.09);--ybr:rgba(255,214,0,.25);
  --red:#FF4545;--rbg:rgba(255,69,69,.09);--rbr:rgba(255,69,69,.25);
  --accent:#38BFFF;--a2:#60CFFF;--abg:rgba(56,191,255,.1);--abr:rgba(56,191,255,.28);
  --r:12px;--rs:8px;
}
body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--t1);font-size:13px;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(5,8,16,.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);height:54px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.chile-flag{font-size:22px;line-height:1}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-1px}
.logo span{color:var(--blue)}
.hdr-r{display:flex;align-items:center;gap:8px}
.spill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:10px;font-weight:600;border:1px solid var(--b2);background:var(--bg3)}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot.live{background:var(--green);animation:blink 2s infinite}
.sdot.demo{background:var(--yellow)}
.sdot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hbtn{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid var(--b2);background:var(--bg3);color:var(--t2);transition:all .15s}
.hbtn:hover{color:var(--t1);border-color:var(--b3)}
.hbtn.ac{background:var(--abg);border-color:var(--abr);color:var(--blue)}

/* NAV */
.nav{background:var(--bg1);border-bottom:1px solid var(--b1);
  display:flex;overflow-x:auto;scrollbar-width:none;padding:0 6px}
.nav::-webkit-scrollbar{display:none}
.ntab{padding:12px 13px;font-size:12px;font-weight:500;cursor:pointer;border:none;
  background:transparent;color:var(--t3);white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .18s}
.ntab:hover{color:var(--t2)}
.ntab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* LAYOUT */
.view{padding:14px 16px;max-width:900px;margin:0 auto;min-height:calc(100vh - 104px)}

/* TIME FILTER BAR */
.tbar{display:flex;gap:6px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.tbar-label{font-size:11px;color:var(--t3);white-space:nowrap}
.tchip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;
  border:1px solid var(--b2);background:transparent;color:var(--t2);white-space:nowrap;transition:all .15s}
.tchip:hover{background:var(--bg3);color:var(--t1)}
.tchip.on{background:var(--abg);color:var(--blue);border-color:var(--abr)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r)}
.cp{padding:14px 16px}

/* KPI */
.krow{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:480px){.krow{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px}
.kl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.kv{font-size:26px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.ks{font-size:10px;color:var(--t3);margin-top:4px}
.ks.up{color:var(--green)}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.bdg.g{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.bdg.y{background:var(--ybg);color:var(--yellow);border:1px solid var(--ybr)}
.bdg.r{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
.bdg.b{background:var(--abg);color:var(--blue);border:1px solid var(--abr)}

/* SIG */
.sig{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;text-transform:uppercase}
.sig.AP{background:var(--gbg);color:var(--green)}
.sig.ES{background:var(--ybg);color:var(--yellow)}
.sig.EV{background:var(--rbg);color:var(--red)}

/* PROGRESS */
.pb{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:4px}
.pbf{height:100%;border-radius:2px;transition:width .5s}

/* MATCH CARD */
.mc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  margin-bottom:10px;overflow:hidden;transition:border-color .18s}
.mc:hover{border-color:var(--b2)}
.mc.open{border-color:var(--abr)}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer}
.mc-lg{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.mc-time{font-size:11px;color:var(--blue);font-weight:600}
.mc-body{display:flex;align-items:center;padding:0 14px 10px;gap:6px;cursor:pointer}
.mc-team{flex:1}
.mc-team.r{text-align:right}
.mc-tn{font-size:13px;font-weight:700}
.mc-vs{text-align:center;flex-shrink:0;padding:0 8px}
.mc-vst{font-size:10px;color:var(--t3);font-weight:700}
.mc-prob{font-size:10px;color:var(--t2);margin-top:1px}
/* MARKET PILLS inline */
.mc-mkts{padding:0 14px 4px}
.mkt-row{display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;border-radius:var(--rs);background:var(--bg3);margin-bottom:5px;cursor:default}
.mkt-left{display:flex;align-items:center;gap:8px}
.mkt-icon{font-size:13px;flex-shrink:0}
.mkt-name{font-size:11px;font-weight:600;color:var(--t1)}
.mkt-sub{font-size:10px;color:var(--t3);margin-top:1px}
.mkt-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.mkt-pct{font-size:14px;font-weight:800;font-family:'Syne',sans-serif}
.rec-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap}
.rec-tag.apostar{background:var(--gbg);color:var(--green);border:1px solid var(--gbr)}
.rec-tag.esperar{background:var(--ybg);color:var(--yellow);border:1px solid var(--ybr)}
.rec-tag.evitar{background:var(--rbg);color:var(--red);border:1px solid var(--rbr)}
.mc-detail{display:none;border-top:1px solid var(--b1);padding:14px;animation:fu .2s ease}
.mc.open .mc-detail{display:block}
@keyframes fu{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.mc-track-btn{margin-top:10px;width:100%;padding:9px;background:var(--abg);
  border:1px solid var(--abr);border-radius:var(--rs);color:var(--blue);
  font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.mc-track-btn:hover{background:rgba(56,191,255,.18)}

/* PICKS / SUGS */
.sug{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  padding:16px;margin-bottom:10px;transition:border-color .18s}
.sug:hover{border-color:var(--b2)}
.sug.top{border-color:var(--abr);background:linear-gradient(135deg,var(--bg2),rgba(56,191,255,.05))}
.sug-hdr{display:flex;gap:10px;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.sug-m{font-size:12px;font-weight:700}
.sug-s{font-size:10px;color:var(--t3);margin-top:2px}
.sug-pct{font-size:30px;font-weight:800;font-family:'Syne',sans-serif;line-height:1;flex-shrink:0}
.sug-box{background:var(--bg3);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px}
.sug-pred{font-size:14px;font-weight:700;margin-bottom:3px}
.sug-why{font-size:11px;color:var(--t2);line-height:1.65}
.sug-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}

/* COMBINADA */
.combi{background:var(--bg2);border:2px solid var(--abr);border-radius:var(--r);
  margin-bottom:16px;overflow:hidden}
.combi-hdr{padding:14px 16px;background:var(--abg);display:flex;align-items:center;justify-content:space-between;gap:10px}
.combi-strip{display:flex;border-bottom:1px solid var(--b1)}
.combi-stat{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--b1)}
.combi-stat:last-child{border-right:none}
.cs-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cs-val{font-size:15px;font-weight:800}
.leg{background:var(--bg3);border-radius:var(--rs);padding:12px;margin-bottom:8px}
.leg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.leg-num{width:22px;height:22px;background:var(--abg);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:var(--blue);flex-shrink:0}
.leg-match{font-size:12px;font-weight:700}
.leg-sub{font-size:10px;color:var(--t3)}
.leg-pick{background:var(--bg4);border-radius:6px;padding:8px 10px;margin-bottom:8px;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.leg-pred{font-size:13px;font-weight:800}
.leg-cat{font-size:10px;color:var(--t3);margin-top:2px}
.leg-odds{font-size:18px;font-weight:800;font-family:'Syne',sans-serif;color:var(--yellow)}
.leg-bk{font-size:9px;color:var(--t3);margin-top:2px;text-align:right}
.leg-scores{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.score-chip{background:var(--bg4);border-radius:5px;padding:3px 7px;font-size:10px;font-weight:700}
.leg-bks{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.leg-bks::-webkit-scrollbar{display:none}
.bkc{background:var(--bg4);border-radius:5px;padding:4px 7px;text-align:center;flex-shrink:0;min-width:58px}
.bkc.best{background:var(--gbg);border:1px solid var(--gbr)}
.bkn{font-size:8px;color:var(--t3);margin-bottom:1px}
.bkp{font-size:11px;font-weight:700}
.bkp.best{color:var(--green)}
.leg-why{background:rgba(56,191,255,.07);border-left:2px solid var(--blue);
  border-radius:0 6px 6px 0;padding:7px 10px;font-size:11px;color:var(--t2);line-height:1.65}
.leg-why-lbl{font-size:9px;color:var(--blue);font-weight:700;margin-bottom:3px}

/* ODDS */
.oe{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.oe-hdr{padding:12px 14px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;gap:8px}
.oe-m{font-size:13px;font-weight:700}
.oe-meta{font-size:10px;color:var(--t3);margin-top:2px}
.oe-time{font-size:11px;color:var(--blue);font-weight:600;flex-shrink:0}
.oe-ocs{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.oe-oc{background:var(--bg3);border-radius:var(--rs);padding:10px 12px}
.oe-oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.oe-oc-n{font-size:12px;font-weight:600}
.oe-bk{font-size:10px;color:var(--t2);margin-top:2px;display:flex;align-items:center;gap:4px}
.bkdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.oe-price{font-size:22px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.oe-impl{font-size:9px;color:var(--t3)}
.bk-scroll{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;margin-top:6px;padding-bottom:2px}
.bk-scroll::-webkit-scrollbar{display:none}

/* SCORES */
.sc-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  padding:12px 14px;margin-bottom:8px}
.sc-hdr{display:flex;justify-content:space-between;margin-bottom:8px}
.sc-lg{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.sc-st{font-size:10px;font-weight:700}
.sc-teams{display:flex;align-items:center;justify-content:space-between;gap:6px}
.sc-t{flex:1;font-size:13px;font-weight:600}
.sc-t.r{text-align:right}
.sc-res{text-align:center;font-size:20px;font-weight:800;font-family:'Syne',sans-serif;padding:0 10px;color:var(--blue)}

/* CHILE TABLE */
.cht{width:100%;border-collapse:collapse}
.cht th{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;
  padding:6px 8px;border-bottom:1px solid var(--b1);text-align:center;white-space:nowrap}
.cht th:first-child,.cht th:nth-child(2){text-align:left}
.cht td{padding:8px;font-size:12px;border-bottom:1px solid var(--b1);text-align:center;vertical-align:middle}
.cht td:first-child{color:var(--t3);font-size:11px;width:24px}
.cht td:nth-child(2){text-align:left;font-weight:600}
.cht tr:last-child td{border:none}
.cht tr.ucl td{border-left:3px solid var(--blue)}
.cht tr.rel td{border-left:3px solid var(--red)}
.pts{font-weight:800;color:var(--blue)}
.cht-form{display:flex;gap:2px;justify-content:center}
.fd{width:14px;height:14px;border-radius:3px;font-size:7px;font-weight:700;
  display:flex;align-items:center;justify-content:center}
.fd.W{background:var(--gbg);color:var(--green)}
.fd.D{background:var(--ybg);color:var(--yellow)}
.fd.L{background:var(--rbg);color:var(--red)}

/* NEWS */
.news-grid{display:flex;flex-direction:column;gap:10px}
.news-card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  overflow:hidden;display:flex;gap:0;transition:border-color .18s;text-decoration:none}
.news-card:hover{border-color:var(--b2)}
.news-img{width:100px;min-width:100px;background:var(--bg4);overflow:hidden;flex-shrink:0}
.news-img img{width:100%;height:100%;object-fit:cover;display:block}
.news-img.placeholder{display:flex;align-items:center;justify-content:center;font-size:28px;height:80px}
.news-body{padding:10px 12px;flex:1;min-width:0}
.news-tag{font-size:9px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.news-title{font-size:12px;font-weight:700;line-height:1.45;margin-bottom:4px;color:var(--t1)}
.news-meta{font-size:10px;color:var(--t3)}

/* TRACKER */
.trc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.tr-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b1)}
.tr-row:last-child{border:none}
.tr-ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.tr-info{flex:1;min-width:0}
.tr-m{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-s{font-size:10px;color:var(--t3);margin-top:2px}
.tr-btns{display:flex;gap:4px;flex-shrink:0}
.tr-btn{padding:4px 8px;border-radius:6px;font-size:10px;font-weight:600;
  cursor:pointer;border:1px solid transparent;background:transparent}

/* SECTION HDR */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sh-t{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px}
.sh-a{font-size:11px;color:var(--blue);cursor:pointer;font-weight:500}

/* CHIPS */
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:3px;margin-bottom:12px}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 13px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;
  border:1px solid var(--b2);background:transparent;color:var(--t2);white-space:nowrap;transition:all .15s}
.chip:hover{background:var(--bg3);color:var(--t1)}
.chip.on{background:var(--abg);color:var(--blue);border-color:var(--abr)}

/* QUICK BTNS */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.qbtn{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r);
  border:1px solid var(--b2);background:var(--bg3);cursor:pointer;transition:all .15s;text-align:left}
.qbtn:hover{border-color:var(--b3);background:var(--bg4)}
.qi{font-size:22px;flex-shrink:0}
.ql{font-size:12px;font-weight:700}
.qs{font-size:10px;color:var(--t3);margin-top:2px}

/* NOTICE */
.notice{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--rs);font-size:11px;margin-bottom:12px}
.notice.info{background:var(--abg);border:1px solid var(--abr);color:var(--blue)}
.notice.warn{background:var(--ybg);border:1px solid var(--ybr);color:var(--yellow)}
.notice.ok{background:var(--gbg);border:1px solid var(--gbr);color:var(--green)}

/* LOADING */
.lwrap{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px}
.spin{width:26px;height:26px;border:2px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:12px;color:var(--t3)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px}
.ei{font-size:36px;margin-bottom:10px}
.et{font-size:13px;color:var(--t2);margin-bottom:4px}
.es{font-size:11px;color:var(--t3)}

/* SEL */
.sel{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);
  padding:8px 12px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;outline:none;cursor:pointer}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);
  z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:16px;
  padding:24px;width:100%;max-width:420px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:8px}
.modal p{font-size:12px;color:var(--t2);margin-bottom:16px;line-height:1.65}
.modal label{font-size:11px;color:var(--t3);display:block;margin-bottom:5px}
.modal input{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--rs);
  padding:10px 13px;color:var(--t1);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s;margin-bottom:12px}
.modal input:focus{border-color:var(--blue)}
.mbtns{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;padding:10px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;border:none}
.mbtn.pri{background:var(--blue);color:#000}
.mbtn.pri:hover{background:var(--blue2)}
.mbtn.sec{background:var(--bg4);color:var(--t2)}
.mbtn.sec:hover{color:var(--t1)}

/* USAGE */
.ubar{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rs);margin-bottom:12px}
.ul{font-size:10px;color:var(--t3);white-space:nowrap}
.utrack{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.ufill{height:100%;border-radius:2px;transition:width .4s}
.uval{font-size:11px;font-weight:700;white-space:nowrap}

/* REFRESH */
.rbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;
  font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--abr);
  background:var(--abg);color:var(--blue);transition:all .15s;white-space:nowrap}

/* ═══ MATH ══════════════════════════════════════════════ */
function fac(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
function poi(l,k){return Math.pow(l,k)*Math.exp(-l)/fac(k);}

function impliedProbs(ev){
  var map={};
  (ev.bookmakers||[]).forEach(function(b){
    var m=null;
    for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='h2h'){m=b.markets[i];break;}}
    if(!m)return;
    m.outcomes.forEach(function(o){if(!map[o.name]||o.price>map[o.name])map[o.name]=o.price;});
  });
  var ks=Object.keys(map);
  if(!ks.length)return null;
  var sum=ks.reduce(function(s,k){return s+(1/map[k]);},0);
  var pr={};
  ks.forEach(function(k){pr[k]=(1/map[k])/sum;});
  return pr;
}

function calcPoi(pH,pA){
  var pD=Math.max(0,1-pH-pA);
  var lH=Math.max(0.5,-Math.log(Math.max(0.01,1-pH))*1.8);
  var lA=Math.max(0.5,-Math.log(Math.max(0.01,1-pA))*1.8);
  var max=7,o15=0,o25=0,o35=0,btts=0,top=[];
  for(var i=0;i<=max;i++)for(var j=0;j<=max;j++){
    var p=poi(lH,i)*poi(lA,j);
    if(i+j>1.5)o15+=p;if(i+j>2.5)o25+=p;if(i+j>3.5)o35+=p;
    if(i>=1&&j>=1)btts+=p;
    if(i<=4&&j<=4)top.push({h:i,a:j,p:p});
  }
  top.sort(function(a,b){return b.p-a.p;});
  return{pH:pH,pA:pA,pD:pD,lH:lH,lA:lA,o15:o15,o25:o25,o35:o35,btts:btts,top:top.slice(0,6)};
}

function analyzeEv(ev){
  var ip=impliedProbs(ev);
  if(!ip)return null;
  var pH=ip[ev.home_team]||0.33,pA=ip[ev.away_team]||0.33;
  var tot=pH+pA+(ip['Draw']||0);
  pH/=tot;pA/=tot;
  var pD=Math.max(0,1-pH-pA);
  var pa=calcPoi(pH,pA);pa.pD=pD;

  /* Get over/under odds if available */
  var ou25=null,ou15=null;
  (ev.bookmakers||[]).forEach(function(b){
    var m=null;
    for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='totals'){m=b.markets[i];break;}}
    if(!m)return;
    m.outcomes.forEach(function(o){
      if(o.name==='Over'&&o.point===2.5&&(!ou25||o.price>ou25.price))ou25={price:o.price,bk:b.key};
      if(o.name==='Over'&&o.point===1.5&&(!ou15||o.price>ou15.price))ou15={price:o.price,bk:b.key};
    });
  });
  /* Adjust model prob from market odds if available */
  if(ou25) pa.o25=Math.max(pa.o25,1/ou25.price*0.9);
  if(ou15) pa.o15=Math.max(pa.o15,1/ou15.price*0.9);

  var mkts=[
    {cat:'1X2',    icon:'⚽',name:'Victoria '+ev.home_team,  prob:pa.pH,  key:'home',  rec:recText(pa.pH)},
    {cat:'1X2',    icon:'🤝',name:'Empate',                   prob:pa.pD,  key:'draw',  rec:recText(pa.pD)},
    {cat:'1X2',    icon:'⚽',name:'Victoria '+ev.away_team,   prob:pa.pA,  key:'away',  rec:recText(pa.pA)},
    {cat:'BTTS',   icon:'🎯',name:'Ambos anotan — Sí',        prob:pa.btts,key:'btts',  rec:recText(pa.btts)},
    {cat:'Goles',  icon:'📊',name:'Over 1.5 goles',           prob:pa.o15, key:'o15',   rec:recText(pa.o15)},
    {cat:'Goles',  icon:'📊',name:'Over 2.5 goles',           prob:pa.o25, key:'o25',   rec:recText(pa.o25)},
    {cat:'Goles',  icon:'📊',name:'Over 3.5 goles',           prob:pa.o35, key:'o35',   rec:recText(pa.o35)},
    {cat:'Corners',icon:'🚩',name:'Over 8.5 corners',         prob:Math.min(0.82,pa.o25*1.1+0.05),key:'c85',rec:''},
    {cat:'Corners',icon:'🚩',name:'Over 10.5 corners',        prob:Math.min(0.72,pa.o25*0.9),key:'c105',rec:''},
    {cat:'DC',     icon:'🛡',name:'DC ('+ev.home_team+' o Emp)',prob:pa.pH+pa.pD,key:'dc_h',rec:recText(pa.pH+pa.pD)},
    {cat:'DC',     icon:'🛡',name:'DC ('+ev.away_team+' o Emp)',prob:pa.pA+pa.pD,key:'dc_a',rec:recText(pa.pA+pa.pD)}
  ];
  mkts.forEach(function(m){
    m.sig=m.prob>=0.65?'AP':m.prob>=0.48?'ES':'EV';
    m.rk =m.prob>=0.65?'g':m.prob>=0.48?'y':'r';
    if(!m.rec) m.rec=recText(m.prob);
  });
  mkts.sort(function(a,b){return b.prob-a.prob;});
  return{pa:pa,mkts:mkts,ip:ip};
}

function recText(p){
  if(p>=0.70) return '🟢 APOSTAR — Alta probabilidad';
  if(p>=0.62) return '🟡 RECOMENDADO — Buena señal';
  if(p>=0.50) return '🟠 CONSIDERAR — Señal moderada';
  return '🔴 EVITAR — Baja probabilidad';
}

/* ═══ SUGGESTIONS ══════════════════════════════════════ */
function buildSugs(evs){
  var pool=[];
  evs.forEach(function(ev){
    var a=analyzeEv(ev);
    if(!a)return;
    a.mkts.forEach(function(mk){
      if(mk.prob>=0.60)pool.push({
        evId:ev.id,sport_key:ev.sport_key,
        match:ev.home_team+' vs '+ev.away_team,
        home:ev.home_team,away:ev.away_team,
        league:(SC[ev.sport_key]||{}).n||ev.sport_key,
        group:(SC[ev.sport_key]||{}).g||'Otros',
        date:fmtDate(ev.commence_time),
        cat:mk.cat,pred:mk.name,
        prob:mk.prob,rk:mk.rk,sig:mk.sig,
        reason:buildReason(ev,mk,a),
        analysis:a,ev:ev
      });
    });
  });
  pool.sort(function(a,b){return b.prob-a.prob;});
  var mc={},out=[];
  pool.forEach(function(p){if(!mc[p.evId]&&out.length<10){mc[p.evId]=1;out.push(p);}});
  return out;
}

function buildReason(ev,mk,a){
  var ip=a.ip;
  var hP=Math.round((ip[ev.home_team]||0)*100);
  var aP=Math.round((ip[ev.away_team]||0)*100);
  var lH=a.pa.lH.toFixed(2),lA=a.pa.lA.toFixed(2);
  if(mk.key==='home') return 'Mercado implica '+hP+'% para '+ev.home_team+'. Modelo Poisson ajustado: '+p0(mk.prob)+'%. Lambda esperado: '+lH+' goles. Tendencia local favorable.';
  if(mk.key==='away') return 'Mercado implica '+aP+'% para '+ev.away_team+'. Modelo Poisson: '+p0(mk.prob)+'%. Lambda: '+lA+' goles esperados como visitante.';
  if(mk.key==='draw') return 'Distribución Poisson indica '+p0(mk.prob)+'% de empate con lambdas L:'+lH+' V:'+lA+'. Equipos equilibrados en el mercado.';
  if(mk.cat==='BTTS') return 'Lambda local '+lH+' y visitante '+lA+' sugieren goles de ambos equipos. Prob. Poisson: '+p0(mk.prob)+'%.';
  if(mk.cat==='Goles') return 'Total esperado: '+(a.pa.lH+a.pa.lA).toFixed(2)+' goles. '+mk.name+' con '+p0(mk.prob)+'% según modelo distribucional.';
  if(mk.cat==='Corners') return 'Estimado desde intensidad ofensiva: '+p0(mk.prob)+'% de probabilidad. Alta correlación con xG total esperado '+(a.pa.lH+a.pa.lA).toFixed(2)+'.';
  return 'Prob. combinada '+p0(mk.prob)+'% cubre 2 de 3 resultados basado en cuotas reales del mercado.';
}

/* ═══ COMBINADAS ════════════════════════════════════════ */
function buildCombis(evs){
  var byGroup={};
  evs.forEach(function(ev){
    var a=analyzeEv(ev);
    if(!a)return;
    var grp=(SC[ev.sport_key]||{}).g||'Otros';
    var best=null;
    a.mkts.forEach(function(mk){if(mk.prob>=0.55&&(!best||mk.prob>best.prob))best=mk;});
    if(!best)return;
    /* Find best odds for this pick */
    var bestOdds=null;
    (ev.bookmakers||[]).forEach(function(b){
      var m=null;
      for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='h2h'){m=b.markets[i];break;}}
      if(!m)return;
      m.outcomes.forEach(function(o){
        var ok=(o.name===ev.home_team&&best.key==='home')||(o.name===ev.away_team&&best.key==='away')||(o.name==='Draw'&&best.key==='draw');
        if(ok&&(!bestOdds||o.price>bestOdds.price))bestOdds={price:o.price,bookie:b.key,title:b.title};
      });
    });
    var odds=bestOdds?bestOdds.price:parseFloat((1/best.prob*1.05).toFixed(2));
    if(!byGroup[grp])byGroup[grp]=[];
    byGroup[grp].push({evId:ev.id,match:ev.home_team+' vs '+ev.away_team,
      home:ev.home_team,away:ev.away_team,
      league:(SC[ev.sport_key]||{}).n||ev.sport_key,sport_key:ev.sport_key,
      group:grp,date:fmtDate(ev.commence_time),pick:best,odds:odds,
      bestBookie:bestOdds,analysis:a,ev:ev});
  });
  var out=[];
  Object.keys(byGroup).forEach(function(g){
    var picks=byGroup[g].slice().sort(function(a,b){return b.pick.prob-a.pick.prob;}).slice(0,4);
    if(picks.length<2)return;
    var combP=picks.reduce(function(p,x){return p*x.pick.prob;},1);
    var combO=picks.reduce(function(p,x){return p*x.odds;},1);
    var rk=combP>=0.45?'g':combP>=0.30?'y':'r';
    var ev_val=combP*combO-1;
    out.push({group:g,picks:picks,combP:combP,combO:combO,rk:rk,ev:ev_val});
  });
  out.sort(function(a,b){return b.combP-a.combP;});
  return out;
}

function p0(v){return (v*100).toFixed(0);}
function p1(v){return (v*100).toFixed(1);}
function rCol(r){return r==='g'?'var(--green)':r==='y'?'var(--yellow)':'var(--red)';}
function rLbl(r){return r==='g'?'Bajo':r==='y'?'Medio':'Alto';}
function sLbl(s){return s==='AP'?'APOSTAR':s==='ES'?'ESPERAR':'EVITAR';}
function fmtDate(iso){
  try{var d=new Date(iso);return d.toLocaleString('es',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}

}

/* ═══ ODDS HELPERS ══════════════════════════════════════ */
function parseBest(ev,mktKey){
  var map={};
  (ev.bookmakers||[]).forEach(function(b){
    var m=null;
    for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key===mktKey){m=b.markets[i];break;}}
    if(!m)return;
    m.outcomes.forEach(function(o){
      if(!map[o.name])map[o.name]=[];
      map[o.name].push({bookie:b.key,title:b.title,price:o.price,point:o.point});
    });
  });
  return Object.keys(map).map(function(name){
    var arr=map[name].slice().sort(function(a,b){return b.price-a.price;});
    return{name:name,best:arr[0],all:arr,spread:(arr[0].price-arr[arr.length-1].price).toFixed(2)};
  });
}

function renderPicks(){
  var evs=getEventsFiltered();
  var sugs=buildSugs(evs);
  var combis=buildCombis(evs);
  var tab=A.picksTab||'picks';

  var switcher='<div class="tsw">'
    +'<button class="tsw-btn'+(tab==='picks'?' on':'')+'" onclick="A.picksTab=\'picks\';render()">💡 Picks</button>'
    +'<button class="tsw-btn'+(tab==='combis'?' on':'')+'" onclick="A.picksTab=\'combis\';render()">🎰 Combinadas</button>'
    +'<button class="tsw-btn'+(tab==='partidos'?' on':'')+'" onclick="A.picksTab=\'partidos\';render()">⚽ Partidos</button>'
    +'</div>';

  var chips=[['all','Todos'],['1X2','1X2'],['Goles','Goles'],['BTTS','BTTS'],['Corners','Corners'],['DC','DC']].map(function(x){
    return '<button class="chip'+(A.fCat===x[0]?' on':'')+'" onclick="A.fCat=\''+x[0]+'\';render()">'+x[1]+'</button>';
  }).join('');

  var body='';
  if(tab==='picks'){
    var filtered=sugs.filter(function(s){return (A.fCat==='all'||s.cat===A.fCat)&&s.prob*100>=A.minP;});
    body=filtered.length
      ?filtered.map(function(s,i){return sugCardHtml(s,i===0);}).join('')
      :'<div class="empty"><div class="ei">🔍</div><div class="et">Sin picks con ese filtro</div><div class="es">Baja el mínimo de probabilidad o cambia el filtro.</div></div>';
    return '<div class="sh"><div class="sh-t">Picks</div>'+rbtn('picks','loadAll()')+'</div>'
      +usageHtml()+timeBar()+switcher+'<div class="chips">'+chips+'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
      +'<span style="font-size:11px;color:var(--t2);white-space:nowrap">Prob. min:</span>'
      +'<input type="range" min="0" max="75" step="5" value="'+A.minP+'" style="flex:1"'
      +' oninput="A.minP=parseInt(this.value);document.getElementById(\'plbl\').textContent=this.value+\'%\';render()">'
      +'<span id="plbl" style="font-size:12px;font-weight:700;color:var(--blue);min-width:34px">'+A.minP+'%</span>'
      +'</div>'+body;
  }
  if(tab==='combis'){
    /* Global combinada */
    var globalHtml='';
    if(combis.length>=3){
      var gPicks=combis.map(function(c){return c.picks[0];});
      var gP=gPicks.reduce(function(p,x){return p*x.pick.prob;},1);
      var gO=gPicks.reduce(function(p,x){return p*x.odds;},1);
      var gEv=gP*gO-1;
      var gRk=gP>=0.35?'y':'r';
      globalHtml='<div style="background:linear-gradient(135deg,var(--abg),rgba(0,230,118,.06));border:2px solid var(--abr);border-radius:var(--r);padding:16px;margin-bottom:16px">'
        +'<div style="font-size:10px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">🌍 Mega Combinada Global — '+gPicks.length+' países</div>'
        +'<div style="display:flex;gap:12px;align-items:flex-start">'
        +'<div style="flex:1">'+gPicks.map(function(p){
          return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b1)">'
            +'<div style="background:var(--abg);border-radius:6px;padding:3px 7px;font-size:11px;font-weight:800;color:var(--blue);flex-shrink:0">'+p0(p.pick.prob)+'%</div>'
            +'<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.match+'</div>'
            +'<div style="font-size:10px;color:var(--t3)">'+p.pick.name+' · cuota '+p.odds.toFixed(2)+'</div></div></div>';
        }).join('')+'</div>'
        +'<div style="text-align:center;background:var(--bg3);border-radius:var(--rs);padding:12px 14px;flex-shrink:0">'
        +'<div style="font-size:10px;color:var(--t3);margin-bottom:3px">Prob.</div>'
        +'<div style="font-size:26px;font-weight:800;font-family:Syne,sans-serif;color:'+rCol(gRk)+'">'+p1(gP)+'%</div>'
        +'<div style="font-size:10px;color:var(--t3);margin-top:6px">Cuota total</div>'
        +'<div style="font-size:20px;font-weight:800;font-family:Syne,sans-serif;color:var(--yellow)">'+gO.toFixed(2)+'</div>'
        +'<div style="font-size:10px;margin-top:4px;color:'+(gEv>0?'var(--green)':'var(--red)')+'">EV '+(gEv>0?'+':'')+(gEv*100).toFixed(1)+'%</div>'
        +'</div></div>'
        +'<button onclick="addBet(\'Mega Combinada Global\',\''+gPicks.length+' legs\','+gP.toFixed(3)+')" '
        +'style="margin-top:12px;width:100%;padding:9px;background:var(--abg);border:1px solid var(--abr);border-radius:var(--rs);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer">🎯 Añadir al Tracker</button>'
        +'</div>';
    }
    var combHtml=combis.length?combis.map(combiCardHtml).join('')
      :'<div class="empty"><div class="ei">🎰</div><div class="et">Sin combinadas disponibles</div><div class="es">Necesitas al menos 2 partidos por región con picks válidos.</div></div>';
    return '<div class="sh"><div class="sh-t">Combinadas</div>'+rbtn('picks','loadAll()')+'</div>'
      +usageHtml()+timeBar()+switcher+globalHtml+combHtml;
  }
  if(tab==='partidos'){
    var allEvs=getEventsFiltered();
    var cards=allEvs.map(function(ev){return matchCardHtml(ev,A.fCat);}).join('');
    return '<div class="sh"><div class="sh-t">Partidos</div>'+rbtn('picks','loadAll()')+'</div>'
      +usageHtml()+timeBar()+switcher+'<div class="chips">'+chips+'</div>'
      +(cards||'<div class="empty"><div class="ei">📭</div><div class="et">Sin partidos</div><div class="es">Amplía el período o actualiza.</div></div>');
  }
  return '';
}

function sugCardHtml(s,isTop){
  return '<div class="sug'+(isTop?' top':'')+'">'
    +(isTop?'<div style="font-size:10px;color:var(--blue);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.6px">⭐ Mejor pick</div>':'')
    +'<div class="sug-hdr"><div style="flex:1;min-width:0">'
    +'<div class="sug-m">'+s.match+'</div>'
    +'<div class="sug-s">'+s.league+' · '+s.date+'</div>'
    +'<div style="margin-top:5px"><span class="bdg '+s.rk+'">'+rLbl(s.rk)+' riesgo</span></div>'
    +'</div><div style="text-align:right;flex-shrink:0">'
    +'<div class="sug-pct" style="color:'+rCol(s.rk)+'">'+p0(s.prob)+'%</div>'
    +'<div style="font-size:9px;color:var(--t3);margin-top:2px">prob.</div></div></div>'
    +'<div class="sug-box">'
    +'<div class="sug-pred">'+s.pred+'</div>'
    +'<div style="font-size:10px;color:var(--blue);font-weight:600;margin-bottom:4px">'+s.cat+'</div>'
    +'<div style="background:var(--bg4);border-radius:6px;padding:6px 8px;margin-bottom:6px;font-size:11px;font-weight:700;color:'+(s.rk==='g'?'var(--green)':s.rk==='y'?'var(--yellow)':'var(--red)')+'">'+s.reason.split('.')[0]+'.</div>'
    +'<div class="sug-why">'+s.reason+'</div></div>'
    +'<div class="pb"><div class="pbf" style="width:'+p0(s.prob)+'%;background:'+rCol(s.rk)+'"></div></div>'
    +'<div class="sug-foot"><span class="sig '+s.sig+'">'+sLbl(s.sig)+'</span>'
    +'<button onclick="addBet(\''+s.match.replace(/'/g,'')+'\',\''+s.pred.replace(/'/g,'')+'\','+s.prob.toFixed(3)+');event.stopPropagation()" '
    +'style="padding:5px 11px;background:var(--abg);border:1px solid var(--abr);border-radius:8px;color:var(--blue);font-size:11px;font-weight:600;cursor:pointer">+ Tracker</button>'
    +'</div></div>';
}

function combiCardHtml(c){
  var riskBor=c.rk==='g'?'var(--gbr)':c.rk==='y'?'var(--ybr)':'var(--rbr)';
  var riskBg =c.rk==='g'?'var(--gbg)':c.rk==='y'?'var(--ybg)':'var(--rbg)';
  var evTxt=(c.ev>0?'+':'')+(c.ev*100).toFixed(1)+'%';
  var evCol=c.ev>0?'var(--green)':'var(--red)';

  var legsHtml=c.picks.map(function(p,idx){
    var R=18,ci=2*Math.PI*R;
    var donut='<svg width="42" height="42" style="transform:rotate(-90deg);flex-shrink:0">'
      +'<circle cx="21" cy="21" r="'+R+'" fill="none" stroke="var(--bg4)" stroke-width="3"/>'
      +'<circle cx="21" cy="21" r="'+R+'" fill="none" stroke="'+rCol(p.pick.rk)+'" stroke-width="3"'
      +' stroke-dasharray="'+(ci*p.pick.prob).toFixed(1)+' '+ci.toFixed(1)+'" stroke-linecap="round"/>'
      +'<text x="21" y="21" text-anchor="middle" dominant-baseline="central" fill="'+rCol(p.pick.rk)+'"'
      +' font-size="9" font-weight="700" font-family="Inter" transform="rotate(90,21,21)">'+p0(p.pick.prob)+'%</text>'
      +'</svg>';
    var scores=(p.analysis.pa.top||[]).slice(0,3).map(function(s){
      return '<span class="score-chip">'+s.h+'-'+s.a+' <span style="color:var(--t3)">'+p1(s.p)+'%</span></span>';
    }).join('');
    var bkOdds=[];
    (p.ev.bookmakers||[]).forEach(function(b){
      var m=null;
      for(var i=0;i<(b.markets||[]).length;i++){if(b.markets[i].key==='h2h'){m=b.markets[i];break;}}
      if(!m)return;
      m.outcomes.forEach(function(o){
        var ok=(o.name===p.home&&p.pick.key==='home')||(o.name===p.away&&p.pick.key==='away')||(o.name==='Draw'&&p.pick.key==='draw');
        if(ok)bkOdds.push({b:b.key,price:o.price});
      });
    });
    bkOdds.sort(function(a,b){return b.price-a.price;});
    var bkHtml=bkOdds.slice(0,6).map(function(o,i){
      var bm=bk(o.b);
      return '<div class="bkc'+(i===0?' best':'')+'">'
        +'<div class="bkn">'+bm.l.slice(0,8)+'</div>'
        +'<div class="bkp'+(i===0?' best':'')+'">'+o.price.toFixed(2)+'</div></div>';
    }).join('');
    return '<div class="leg">'
      +'<div class="leg-hdr">'
      +'<div class="leg-num">'+(idx+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div class="leg-match">'+p.match+'</div><div class="leg-sub">'+p.league+' · '+p.date+'</div></div>'
      +donut+'</div>'
      +'<div class="leg-pick">'
      +'<div><div class="leg-pred">'+p.pick.name+'</div><div class="leg-cat">'+p.pick.cat+' · Prob. '+p1(p.pick.prob)+'%</div></div>'
      +'<div style="text-align:right"><div class="leg-odds">'+p.odds.toFixed(2)+'</div>'
      +(p.bestBookie?'<div class="leg-bk">'+bk(p.bestBookie.bookie).l+'</div>':'')
      +'</div></div>'
      +(scores?'<div class="leg-scores">'+scores+'</div>':'')
      +(bkHtml?'<div class="leg-bks">'+bkHtml+'</div>':'')
      +'<div class="leg-why"><div class="leg-why-lbl">¿Por qué esta selección?</div>'+buildReason(p.ev,p.pick,p.analysis)+'</div>'
      +'</div>';
  }).join('');

  return '<div class="combi">'
    +'<div class="combi-hdr" style="background:'+riskBg+'">'
    +'<div><div style="font-size:13px;font-weight:800">'+c.group+' — '+c.picks.length+' selecciones</div>'
    +'<div style="font-size:11px;color:var(--t2);margin-top:2px">Combinada optimizada por probabilidad estadística</div></div>'
    +'<div style="text-align:right;flex-shrink:0">'
    +'<div style="font-size:10px;color:var(--t3)">Prob. combinada</div>'
    +'<div style="font-size:26px;font-weight:800;font-family:Syne,sans-serif;color:'+rCol(c.rk)+'">'+p1(c.combP)+'%</div>'
    +'</div></div>'
    +'<div class="combi-strip">'
    +[['Cuota total',c.combO.toFixed(2),'var(--yellow)'],['EV esperado',evTxt,evCol],['Riesgo',rLbl(c.rk),rCol(c.rk)],['Legs',c.picks.length,'var(--blue)']].map(function(x){
      return '<div class="combi-stat"><div class="cs-lbl">'+x[0]+'</div><div class="cs-val" style="color:'+x[2]+'">'+x[1]+'</div></div>';
    }).join('')+'</div>'
    +'<div style="padding:12px 14px">'+legsHtml
    +'<button onclick="addBet(\'COMBINADA: '+c.group.replace(/'/g,'')+'\',\''+c.picks.length+' selecciones\','+c.combP.toFixed(3)+')" '
    +'style="width:100%;padding:10px;background:var(--abg);border:1px solid var(--abr);border-radius:var(--rs);color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;margin-top:4px">🎯 Añadir combinada al Tracker</button>'
    +'</div></div>';
}

function renderOdds(){
  var evs=getEventsFiltered().filter(function(e){return e.sport_key===A.sport;});
  var sportOpts=Object.keys(SC).map(function(k){return '<option value="'+k+'"'+(A.sport===k?' selected':'')+'>'+SC[k].n+'</option>';}).join('');
  var mktOpts=Object.keys(MKT).map(function(k){return '<option value="'+k+'"'+(A.market===k?' selected':'')+'>'+MKT[k]+'</option>';}).join('');
  var body=evs.length?evs.map(function(ev){
    var ocs=parseBest(ev,A.market);if(!ocs.length)return'';
    var ocsHtml=ocs.map(function(oc){
      var meta=bk(oc.best.bookie);
      var col=oc.best.price>=3?'var(--yellow)':oc.best.price>=1.8?'var(--green)':'var(--blue)';
      var chips=oc.all.slice(0,10).map(function(b,i){
        var bm=bk(b.bookie);var isB=b.bookie===oc.best.bookie;
        return '<div class="bkc'+(isB?' best':'')+'">'
          +'<div class="bkn">'+bm.l.slice(0,8)+'</div>'
          +'<div class="bkp'+(isB?' best':'')+'">'+b.price.toFixed(2)+'</div></div>';
      }).join('');
      return '<div class="oe-oc">'
        +'<div class="oe-oc-top"><div><div class="oe-oc-n">'+oc.name+'</div>'
        +'<div class="oe-bk"><span class="bkdot" style="background:'+meta.c+'"></span>'+meta.l+' — mejor</div></div>'
        +'<div><div class="oe-price" style="color:'+col+'">'+oc.best.price.toFixed(2)+'</div>'
        +'<div class="oe-impl">imp. '+(100/oc.best.price).toFixed(1)+'%</div></div></div>'
        +'<div style="height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:5px 0 6px">'
        +'<div style="width:'+Math.min(100,oc.best.price/5*100).toFixed(0)+'%;height:100%;background:'+col+'"></div></div>'
        +'<div class="bk-scroll">'+chips+'</div></div>';
    }).join('');
    return '<div class="oe"><div class="oe-hdr"><div><div class="oe-m">'+ev.home_team+' vs '+ev.away_team+'</div>'
      +'<div class="oe-meta">'+( (ev.bookmakers||[]).length)+' casas · '+(MKT[A.market]||A.market)+'</div></div>'
      +'<div class="oe-time">'+fmtDate(ev.commence_time)+'</div></div>'
      +'<div class="oe-ocs">'+ocsHtml+'</div></div>';
  }).join(''):'<div class="empty"><div class="ei">📭</div><div class="et">Sin partidos con cuotas</div><div class="es">Prueba otra competición o amplía el período.</div></div>';
  return '<div class="sh"><div class="sh-t">Cuotas</div>'+rbtn('odds','refreshOdds()')+'</div>'
    +usageHtml()+timeBar()
    +'<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<select class="sel" style="flex:1;min-width:180px" onchange="A.sport=this.value;refreshOdds()">'+sportOpts+'</select>'
    +'<select class="sel" style="min-width:130px" onchange="A.market=this.value;render()">'+mktOpts+'</select></div>'
    +body;
}

function renderScores(){
  var sp=A.sport;
  var data=A.scores[sp]||[];
  var sportOpts=Object.keys(SC).map(function(k){return '<option value="'+k+'"'+(sp===k?' selected':'')+'>'+SC[k].n+'</option>';}).join('');
  var body=!A.kv?'<div class="notice info">ℹ️ Añade tu API Key para ver resultados reales en tiempo real.</div>'
    :data.length?data.map(function(ev){
      var sc=ev.scores||[];
      function gs(name){var s=sc.find(function(x){return x.name===name;});return s?s.score:'-';}
      var hS=gs(ev.home_team),aS=gs(ev.away_team);
      var st=ev.completed?'Finalizado':sc.length?'En vivo':'Pendiente';
      var stCol=ev.completed?'var(--t3)':sc.length?'var(--green)':'var(--yellow)';
      return '<div class="sc-card"><div class="sc-hdr"><div class="sc-lg">'+( SC[ev.sport_key]||{}).n+'</div>'
        +'<div class="sc-st" style="color:'+stCol+'">'+st+'</div></div>'
        +'<div class="sc-teams"><div class="sc-t">'+ev.home_team+'</div>'
        +'<div class="sc-res">'+hS+' — '+aS+'</div>'
        +'<div class="sc-t r">'+ev.away_team+'</div></div></div>';
    }).join('')
    :'<div class="empty"><div class="ei">📋</div><div class="et">Sin resultados recientes</div><div class="es">No hay partidos de los últimos 3 días.</div></div>';
  return '<div class="sh"><div class="sh-t">Resultados</div>'+rbtn('scores','refreshScores()')+'</div>'
    +usageHtml()+timeBar()
    +'<select class="sel" style="width:100%;margin-bottom:12px" onchange="A.sport=this.value;refreshScores()">'+sportOpts+'</select>'
    +body;
}

function renderTracker(){
  var bets=A.bets;
  var won=bets.filter(function(b){return b.r==='W';}).length;
  var lost=bets.filter(function(b){return b.r==='L';}).length;
  var pend=bets.filter(function(b){return b.r==='P';}).length;
  var eff=(won+lost)?Math.round(won/(won+lost)*100)+'%':'—';
  var rows=bets.map(function(b,i){
    var ic=b.r==='W'?'✅':b.r==='L'?'❌':'⏳';
    var ibg=b.r==='W'?'var(--gbg)':b.r==='L'?'var(--rbg)':'var(--ybg)';
    var extra=b.r==='P'
      ?'<button class="tr-btn" onclick="updB('+i+',\'W\')" style="background:var(--gbg);color:var(--green);border-color:var(--gbr)">✓</button>'
       +'<button class="tr-btn" onclick="updB('+i+',\'L\')" style="background:var(--rbg);color:var(--red);border-color:var(--rbr)">✗</button>':'';
    extra+='<button class="tr-btn" onclick="delB('+i+')" style="background:var(--bg4);color:var(--t3)">🗑</button>';
    return '<div class="tr-row"><div class="tr-ic" style="background:'+ibg+'">'+ic+'</div>'
      +'<div class="tr-info"><div class="tr-m">'+b.match+'</div>'
      +'<div class="tr-s">'+b.pred+' · '+p0(b.prob)+'% · '+b.date+'</div></div>'
      +'<div class="tr-btns">'+extra+'</div></div>';
  }).join('');
  return '<div class="sh"><div class="sh-t">Tracker personal</div><div class="sh-a" onclick="addBetManual()">+ Añadir</div></div>'
    +'<div class="krow" style="grid-template-columns:repeat(3,1fr)">'
    +'<div class="kpi"><div class="kl">Acertadas</div><div class="kv" style="color:var(--green)">'+won+'</div><div class="ks up">'+eff+'</div></div>'
    +'<div class="kpi"><div class="kl">Falladas</div><div class="kv" style="color:var(--red)">'+lost+'</div><div class="ks"> </div></div>'
    +'<div class="kpi"><div class="kl">Pendientes</div><div class="kv" style="color:var(--yellow)">'+pend+'</div><div class="ks"> </div></div>'
    +'</div>'
    +(bets.length?'<div class="trc">'+rows+'</div>'
      :'<div class="empty"><div class="ei">🎯</div><div class="et">Sin picks registrados</div>'
      +'<div class="es">Usa "+ Tracker" en cualquier sección.</div>'
      +'<button onclick="addBetManual()" style="margin-top:14px;padding:9px 20px;background:var(--abg);border:1px solid var(--abr);border-radius:var(--rs);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer">+ Añadir pick</button></div>');
}

/* ═══ NAVIGATION ════════════════════════════════════════ */
function nav(t){
  A.tab=t;
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  var el=document.getElementById('nt-'+t);if(el)el.classList.add('on');
  render();
  if(t==='news'&&!A.newsCache)loadNews();
}
function navHC(){A.tab='picks';A.minP=65;A.fCat='all';A.picksTab='picks';
  document.querySelectorAll('.ntab').forEach(function(x){x.classList.remove('on');});
  var el=document.getElementById('nt-picks');if(el)el.classList.add('on');render();}
function toggleMatch(id){A.expanded=A.expanded===id?null:id;render();}

/* REFRESH */
function refreshChile(){loadSport('soccer_chile_campeonato').then(render);}
function refreshOdds(){loadSport(A.sport).then(render);}
function refreshScores(){loadScores(A.sport).then(render);}

/* MODAL */
function openModal(){document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function testAndSave(){
  var k=(document.getElementById('m-odds').value||'').trim();
  var res=document.getElementById('m-res');
  if(!k||k.length<20){res.style.color='var(--red)';res.textContent='Key muy corta (~32 caracteres).';return;}
  res.style.color='var(--t3)';res.textContent='Verificando...';
  testKey(k).then(function(sports){
    A.key=k;A.kv=true;localStorage.setItem('biq_k',k);
    res.style.color='var(--green)';res.textContent='✓ Válida — '+sports.length+' deportes disponibles.';
    updateStatus();
    setTimeout(function(){closeModal();loadAll();},800);
  }).catch(function(e){
    A.kv=false;res.style.color='var(--red)';
    res.textContent=e.message==='KEY_INVALID'?'✗ Key inválida.':e.message==='LIMIT'?'✗ Límite alcanzado.':'✗ Error: '+e.message;
  });
}
function updateStatus(){
  var d=document.getElementById('sdot'),t=document.getElementById('stxt');
  if(!d||!t)return;
  d.className='sdot '+(A.kv?'live':A.key?'err':'demo');
  t.textContent=A.kv?'En vivo':A.key?'Key error':'Demo';
}

/* TRACKER ACTIONS */
function addBet(match,pred,prob){
  A.bets.unshift({match:match,pred:pred,prob:isNaN(prob)?0.6:prob,date:new Date().toLocaleDateString('es'),r:'P'});
  localStorage.setItem('biq_bets',JSON.stringify(A.bets));
  alert('✅ Añadido al Tracker');
}
function addBetManual(){
  var m=prompt('Partido:');if(!m)return;
  var p=prompt('Predicción:');if(!p)return;
  var pb=parseFloat(prompt('Probabilidad decimal (ej: 0.72):')||'0.6');
  A.bets.unshift({match:m,pred:p,prob:isNaN(pb)?0.6:pb,date:new Date().toLocaleDateString('es'),r:'P'});
  localStorage.setItem('biq_bets',JSON.stringify(A.bets));render();
}
function updB(i,r){A.bets[i].r=r;localStorage.setItem('biq_bets',JSON.stringify(A.bets));render();}
function delB(i){A.bets.splice(i,1);localStorage.setItem('biq_bets',JSON.stringify(A.bets));render();}

/* ═══ MAIN RENDER ═══════════════════════════════════════ */
function render(){
  var v=document.getElementById('view');if(!v)return;
  try{
    if(A.tab==='dash')   {v.innerHTML=renderDash();return;}
    if(A.tab==='chile')  {v.innerHTML=renderChile();return;}
    if(A.tab==='picks')  {v.innerHTML=renderPicks();return;}
    if(A.tab==='odds')   {v.innerHTML=renderOdds();return;}
    if(A.tab==='scores') {v.innerHTML=renderScores();return;}
    if(A.tab==='news')   {v.innerHTML=renderNews();return;}
    if(A.tab==='tracker'){v.innerHTML=renderTracker();return;}
  }catch(e){v.innerHTML='<div class="notice info">Error: '+e.message+'</div>';console.error(e);}
}

/* ═══ INIT ══════════════════════════════════════════════ */
(function(){
  if(A.key){
    document.getElementById('m-odds').value=A.key;
    testKey(A.key).then(function(){A.kv=true;updateStatus();loadAll();}).catch(function(){A.kv=false;updateStatus();render();});
  } else {
    A.sugs=buildSugs(DEMO);A.combis=buildCombis(DEMO);render();
  }
})();
setInterval(function(){if(A.kv&&(A.tab==='odds'||A.tab==='picks')){loadSport(A.sport).then(render);}},300000);
</script>
</body>
</html>
